<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Muna Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:#fdf2f8;color:#1f2937}
    .safe-bottom{padding-bottom:env(safe-area-inset-bottom,12px)}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-thumb{background:#f9a8d4;border-radius:4px}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#ec4899!important;box-shadow:0 0 0 2px rgba(236,72,153,.15)}
    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl th{background:#fff9fb;color:#9ca3af;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;text-align:left;border-bottom:1px solid #fce7f3;white-space:nowrap;position:sticky;top:0;z-index:1}
    .tbl td{padding:9px 12px;border-bottom:1px solid #fce7f3;vertical-align:middle}
    .tbl tr:hover td{background:#fff5f8}
    .tbl tr:last-child td{border-bottom:none}
    .status-sel{border:none;background:transparent;font-size:11px;font-weight:800;cursor:pointer;outline:none;padding:0 2px;border-radius:4px;font-family:'Nunito',sans-serif}
    .slide-up{animation:slideUp .2s ease-out}
    @keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
    .fade-in{animation:fadeIn .15s ease-out}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .pipeline-bar{display:flex;gap:2px;border-radius:12px;overflow:hidden;height:8px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://tyggjybpadgifadakaof.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1n7GfREMkbbDMrpfGd-TRA_tVCAvgZ7';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════════
const STATUSES   = ['Pending','Purchased','Shipped','Delivered','Paid'];
const CATEGORIES = ['Toner','Serum','Moisturizer','Sunscreen','Cleanser','Mask','Eye Cream','Lip','Body','Hair','Other'];
const SKIN_TYPES = ['All','Dry','Oily','Combination','Sensitive','Normal'];
const EXP_TYPES  = ['Salary','Cargo','Office','Marketing','Other'];

const STATUS_STYLE = {
  Pending:   {bg:'bg-amber-100',  text:'text-amber-800',  dot:'bg-amber-400',  hex:'#fef3c7'},
  Purchased: {bg:'bg-blue-100',   text:'text-blue-800',   dot:'bg-blue-400',   hex:'#dbeafe'},
  Shipped:   {bg:'bg-violet-100', text:'text-violet-800', dot:'bg-violet-400', hex:'#ede9fe'},
  Delivered: {bg:'bg-green-100',  text:'text-green-800',  dot:'bg-green-500',  hex:'#dcfce7'},
  Paid:      {bg:'bg-pink-100',   text:'text-pink-800',   dot:'bg-pink-500',   hex:'#fce7f3'},
};

// ══════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════
const today   = () => new Date().toISOString().slice(0,10);
const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const fmtKRW  = n => `₩${Math.round(+n||0).toLocaleString()}`;
const fmtUZS  = n => `${Math.round(+n||0).toLocaleString()} UZS`;
const fmtNum  = n => (+n||0).toLocaleString();
const lsGet   = (k,d) => { try{const v=localStorage.getItem('muna_'+k);return v?JSON.parse(v):d}catch{return d} };
const lsSet   = (k,v) => { try{localStorage.setItem('muna_'+k,JSON.stringify(v))}catch{} };

// DB mappers
const fromDB = {
  catalog: r => ({ id:r.id, brand:r.brand, name:r.name, category:r.category||'', skinType:r.skin_type||'All', weightGrams:+r.weight_grams||0, estimatedCostKRW:+r.estimated_cost_krw||0, estimatedShippingKRW:+r.estimated_shipping_krw||0, suggestedB2CPrice:+r.suggested_b2c_price_uzs||0, suggestedB2BPrice:+r.suggested_b2b_price_uzs||0, notes:r.notes||'', createdAt:r.created_at?.slice(0,10) }),
  order:   r => ({ id:r.id, customerName:r.customer_name, productId:r.product_id, quantity:+r.quantity||1, priceUZS:+r.price_uzs||0, type:r.type||'B2C', status:r.status||'Pending', salesperson:r.salesperson||'', notes:r.notes||'', createdAt:r.created_at?.slice(0,10) }),
  inv:     r => ({ id:r.id, productId:r.product_id, quantity:+r.quantity||0 }),
  expense: r => ({ id:r.id, date:r.date, type:r.type, description:r.description, amountUZS:+r.amount_uzs||0, paidBy:r.paid_by||'' }),
};
const toDB = {
  catalog: p => ({ brand:p.brand, name:p.name, category:p.category||null, skin_type:p.skinType||'All', weight_grams:+p.weightGrams||0, estimated_cost_krw:+p.estimatedCostKRW||0, suggested_b2c_price_uzs:+p.suggestedB2CPrice||0, suggested_b2b_price_uzs:+p.suggestedB2BPrice||0, notes:p.notes||null }),
  order:   o => ({ customer_name:o.customerName, product_id:o.productId||null, quantity:+o.quantity||1, price_uzs:+o.priceUZS||0, type:o.type||'B2C', status:o.status||'Pending', salesperson:o.salesperson||null, notes:o.notes||null }),
  expense: e => ({ date:e.date, type:e.type, description:e.description, amount_uzs:+e.amountUZS||0, paid_by:e.paidBy||null }),
};

// ══════════════════════════════════════════════════════════════
// UI ATOMS
// ══════════════════════════════════════════════════════════════
function Toast({ msg, type }) {
  if (!msg) return null;
  const bg = type==='error'?'bg-red-500':type==='info'?'bg-blue-500':'bg-green-500';
  return <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[999] px-5 py-2.5 rounded-2xl text-white text-sm font-bold shadow-xl fade-in ${bg}`}>{msg}</div>;
}

const Btn = ({children,onClick,variant='primary',size='md',className='',type='button',disabled=false,loading=false}) => {
  const base='inline-flex items-center justify-center gap-1.5 font-bold rounded-xl transition-all active:scale-95 disabled:opacity-50 whitespace-nowrap';
  const sz={xs:'px-2.5 py-1 text-xs',sm:'px-3 py-1.5 text-xs',md:'px-3.5 py-2 text-sm',lg:'px-4 py-2.5 text-sm w-full'};
  const va={primary:'bg-pink-500 hover:bg-pink-600 text-white shadow-sm',secondary:'bg-pink-50 hover:bg-pink-100 text-pink-700',danger:'bg-red-50 hover:bg-red-100 text-red-600',ghost:'hover:bg-gray-100 text-gray-500',outline:'border border-pink-200 text-pink-600 hover:bg-pink-50'};
  return <button type={type} onClick={onClick} disabled={disabled||loading} className={`${base} ${sz[size]} ${va[variant]} ${className}`}>{loading?<span className="w-3.5 h-3.5 border-2 border-current border-t-transparent rounded-full animate-spin"/>:children}</button>;
};

const Inp = ({label,required,className='',...props}) => (
  <div className={className}>
    {label&&<label className="block text-xs font-bold text-gray-500 mb-1">{label}{required&&<span className="text-pink-500 ml-0.5">*</span>}</label>}
    <input className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50" {...props}/>
  </div>
);

const Sel = ({label,required,children,className='',...props}) => (
  <div className={className}>
    {label&&<label className="block text-xs font-bold text-gray-500 mb-1">{label}{required&&<span className="text-pink-500 ml-0.5">*</span>}</label>}
    <select className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 appearance-none" {...props}>{children}</select>
  </div>
);

const Modal = ({title,onClose,children,wide=false}) => (
  <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center fade-in" style={{background:'rgba(0,0,0,0.4)'}}>
    <div className={`bg-white w-full ${wide?'max-w-2xl':'max-w-lg'} rounded-t-3xl sm:rounded-2xl shadow-2xl max-h-[92vh] flex flex-col slide-up`}>
      <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100 flex-shrink-0">
        <h3 className="font-extrabold text-gray-800">{title}</h3>
        <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 font-black text-lg">×</button>
      </div>
      <div className="overflow-y-auto flex-1 px-5 py-4">{children}</div>
    </div>
  </div>
);

const StatusBadge = ({status, onChange}) => {
  const s = STATUS_STYLE[status]||STATUS_STYLE.Pending;
  return (
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-black ${s.bg} ${s.text}`}>
      <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${s.dot}`}/>
      {onChange
        ? <select value={status} onChange={e=>{e.stopPropagation();onChange(e.target.value)}} onClick={e=>e.stopPropagation()} className={`status-sel ${s.bg} ${s.text}`}>
            {STATUSES.map(x=><option key={x} value={x}>{x}</option>)}
          </select>
        : status}
    </span>
  );
};

const StatBox = ({label,value,sub,color='pink'}) => {
  const gr={pink:'from-pink-500 to-rose-500',violet:'from-violet-500 to-purple-600',green:'from-emerald-500 to-green-600',amber:'from-amber-400 to-orange-500',blue:'from-blue-500 to-indigo-500',gray:'from-gray-500 to-gray-700'};
  return (
    <div className={`bg-gradient-to-br ${gr[color]} rounded-2xl p-4 text-white shadow-sm`}>
      <p className="text-xs font-semibold opacity-70 mb-0.5">{label}</p>
      <p className="text-xl font-black">{value}</p>
      {sub&&<p className="text-xs opacity-60 mt-0.5">{sub}</p>}
    </div>
  );
};

const Empty = ({icon,title,sub,action}) => (
  <div className="flex flex-col items-center justify-center py-16 text-center">
    <div className="text-4xl mb-3">{icon}</div>
    <p className="font-bold text-gray-600 mb-1">{title}</p>
    <p className="text-sm text-gray-400 mb-4">{sub}</p>
    {action}
  </div>
);

const Card = ({children,className=''}) => <div className={`bg-white rounded-2xl border border-pink-50 shadow-sm ${className}`}>{children}</div>;

const TblWrap = ({children}) => (
  <div className="bg-white rounded-2xl border border-pink-50 shadow-sm overflow-hidden">
    <div className="overflow-x-auto"><table className="tbl">{children}</table></div>
  </div>
);

const Spinner = () => (
  <div className="flex items-center justify-center h-40">
    <div className="w-8 h-8 border-4 border-pink-200 border-t-pink-500 rounded-full animate-spin"/>
  </div>
);

// ══════════════════════════════════════════════════════════════
// APP SHELL
// ══════════════════════════════════════════════════════════════
const PAGES = [
  {key:'dashboard', label:'Dashboard', icon:'▦'},
  {key:'orders',    label:'Orders',    icon:'≡'},
  {key:'catalog',   label:'Catalog',   icon:'⊞'},
  {key:'inventory', label:'Stock',     icon:'◫'},
  {key:'expenses',  label:'Expenses',  icon:'$'},
  {key:'settings',  label:'Settings',  icon:'⚙'},
];

function App() {
  const [page,     setPage]     = useState('dashboard');
  const [catalog,  setCatalog]  = useState([]);
  const [orders,   setOrders]   = useState([]);
  const [inventory,setInventory]= useState([]);
  const [expenses, setExpenses] = useState([]);
  const [settings, setSettings] = useState(() => lsGet('settings', {shippingRateKRW:15000, uzsPerKrw:8, salespersons:['Amir','Zara','Dina','Kamol','Sher']}));
  const [loading,  setLoading]  = useState(true);
  const [toast,    setToast]    = useState({msg:'',type:'success'});
  const toastRef = useRef(null);

  const notify = (msg, type='success') => {
    clearTimeout(toastRef.current);
    setToast({msg,type});
    toastRef.current = setTimeout(()=>setToast({msg:'',type:'success'}), 2600);
  };

  // ── LOAD ALL DATA ────────────────────────────────────────────
  useEffect(()=>{
    (async()=>{
      try {
        const [c,o,inv,e] = await Promise.all([
          db.from('catalog').select('*').order('brand'),
          db.from('orders').select('*').order('created_at',{ascending:false}),
          db.from('inventory').select('*'),
          db.from('expenses').select('*').order('date',{ascending:false}),
        ]);
        if(c.error||o.error||inv.error||e.error) throw new Error('Load failed');
        setCatalog(c.data.map(fromDB.catalog));
        setOrders(o.data.map(fromDB.order));
        setInventory(inv.data.map(fromDB.inv));
        setExpenses(e.data.map(fromDB.expense));
      } catch(err) {
        notify('Could not connect to database. Check Supabase keys.','error');
      } finally { setLoading(false); }
    })();
  },[]);

  useEffect(()=>{ lsSet('settings',settings); },[settings]);

  // ── ORDER STATUS UPDATE ──────────────────────────────────────
  const updateOrderStatus = async (orderId, newStatus, oldStatus) => {
    const {error} = await db.from('orders').update({status:newStatus}).eq('id',orderId);
    if(error) return notify('Update failed','error');
    setOrders(prev => prev.map(o => o.id===orderId ? {...o,status:newStatus} : o));

    // Inventory logic: Pending→Purchased = add stock; Purchased→Pending = remove stock
    const order = orders.find(o=>o.id===orderId);
    if(!order?.productId) return;

    if(newStatus==='Purchased' && oldStatus!=='Purchased') {
      await upsertInventory(order.productId, order.quantity);
    } else if(oldStatus==='Purchased' && newStatus==='Pending') {
      await upsertInventory(order.productId, -order.quantity);
    }
    notify(`Status → ${newStatus}`);
  };

  const upsertInventory = async (productId, delta) => {
    const existing = inventory.find(i=>i.productId===productId);
    const newQty   = Math.max(0, (existing?.quantity||0) + delta);
    const {data,error} = await db.from('inventory').upsert({product_id:productId,quantity:newQty,updated_at:new Date().toISOString()},{onConflict:'product_id'}).select().single();
    if(!error && data) setInventory(prev => {
      const exists = prev.find(i=>i.productId===productId);
      const updated = fromDB.inv(data);
      return exists ? prev.map(i=>i.productId===productId?updated:i) : [...prev,updated];
    });
  };

  const ctx = { catalog,setCatalog, orders,setOrders, inventory,setInventory, expenses,setExpenses, settings,setSettings, notify, updateOrderStatus, upsertInventory };

  if(loading) return (
    <div className="min-h-screen flex flex-col items-center justify-center gap-4" style={{background:'#fdf2f8'}}>
      <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center text-white font-black text-2xl shadow-lg">M</div>
      <div className="w-8 h-8 border-4 border-pink-200 border-t-pink-500 rounded-full animate-spin"/>
      <p className="text-sm text-gray-400 font-semibold">Loading Muna Manager…</p>
    </div>
  );

  return (
    <div className="min-h-screen" style={{background:'#fdf2f8'}}>
      <Toast msg={toast.msg} type={toast.type}/>

      {/* ── HEADER ── */}
      <header className="bg-white border-b border-pink-100 sticky top-0 z-30 shadow-sm">
        <div className="max-w-6xl mx-auto px-4 h-12 flex items-center gap-3">
          <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center text-white font-black text-xs shadow-sm flex-shrink-0">M</div>
          <span className="font-black text-gray-800 text-sm hidden xs:block">Muna Manager</span>
          <nav className="flex gap-0.5 ml-2 overflow-x-auto">
            {PAGES.map(p=>(
              <button key={p.key} onClick={()=>setPage(p.key)}
                className={`px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap transition-all ${page===p.key?'bg-pink-500 text-white':'text-gray-500 hover:bg-pink-50 hover:text-pink-600'}`}>
                {p.label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      {/* ── CONTENT ── */}
      <main className="max-w-6xl mx-auto px-4 py-4 pb-6">
        {page==='dashboard' && <DashboardPage  {...ctx}/>}
        {page==='orders'    && <OrdersPage     {...ctx}/>}
        {page==='catalog'   && <CatalogPage    {...ctx}/>}
        {page==='inventory' && <InventoryPage  {...ctx}/>}
        {page==='expenses'  && <ExpensesPage   {...ctx}/>}
        {page==='settings'  && <SettingsPage   {...ctx}/>}
      </main>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════════
function DashboardPage({orders,catalog,expenses,settings}) {
  const stats = useMemo(()=>{
    const byStatus = Object.fromEntries(STATUSES.map(s=>[s,orders.filter(o=>o.status===s)]));
    const paidOrders   = byStatus.Paid||[];
    const totalRevUZS  = paidOrders.reduce((s,o)=>s+(+o.priceUZS||0)*o.quantity,0);

    const totalCostKRW = orders.reduce((s,o)=>{
      const p = catalog.find(c=>c.id===o.productId);
      if(!p) return s;
      const shipping = (p.weightGrams/1000)*(+settings.shippingRateKRW||15000);
      return s + ((+p.estimatedCostKRW||0) + shipping)*(+o.quantity||1);
    },0);
    const totalCostUZS = totalCostKRW * (+settings.uzsPerKrw||8);
    const estimProfit  = totalRevUZS - totalCostUZS;
    const totalExpUZS  = expenses.reduce((s,e)=>s+(+e.amountUZS||0),0);
    const netProfit    = estimProfit - totalExpUZS;

    // Top products
    const prodQty = {};
    orders.forEach(o=>{ if(o.productId) prodQty[o.productId]=(prodQty[o.productId]||0)+(+o.quantity||1); });
    const topProducts = Object.entries(prodQty).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,qty])=>{
      const p = catalog.find(c=>c.id===id);
      return {name:p?`${p.brand} ${p.name}`:'Unknown',qty};
    });

    return {byStatus,totalRevUZS,netProfit,topProducts,totalExpUZS};
  },[orders,catalog,expenses,settings]);

  const total = orders.length;
  const pipelineTotal = total||1;

  return (
    <div className="space-y-5 slide-up">
      <h2 className="font-black text-gray-800 text-xl">Dashboard</h2>

      {/* Stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatBox label="Total Orders"    value={fmtNum(total)}                      sub="All time"            color="pink"/>
        <StatBox label="Total Revenue"   value={fmtUZS(stats.totalRevUZS)}          sub="Paid orders"         color="green"/>
        <StatBox label="Net Profit (est)"value={fmtUZS(stats.netProfit)}            sub="Revenue − costs"     color={stats.netProfit>=0?'violet':'amber'}/>
        <StatBox label="Total Expenses"  value={fmtUZS(stats.totalExpUZS)}          sub="Salary, cargo, etc." color="gray"/>
      </div>

      {/* Pipeline */}
      <Card className="p-4">
        <h3 className="font-extrabold text-gray-700 mb-3">Order Pipeline</h3>
        <div className="pipeline-bar mb-3">
          {STATUSES.map(s=>{
            const cnt=(stats.byStatus[s]||[]).length;
            const pct=Math.max(2,(cnt/pipelineTotal)*100);
            const col={Pending:'#fbbf24',Purchased:'#60a5fa',Shipped:'#a78bfa',Delivered:'#34d399',Paid:'#f472b6'};
            return <div key={s} style={{width:`${pct}%`,background:col[s],minWidth:cnt?'8px':'0'}} title={`${s}: ${cnt}`}/>;
          })}
        </div>
        <div className="grid grid-cols-5 gap-2 text-center">
          {STATUSES.map(s=>{
            const cnt=(stats.byStatus[s]||[]).length;
            const st=STATUS_STYLE[s];
            return (
              <div key={s} className={`${st.bg} rounded-xl p-2`}>
                <p className={`text-xl font-black ${st.text}`}>{cnt}</p>
                <p className={`text-xs font-bold ${st.text} opacity-70`}>{s}</p>
              </div>
            );
          })}
        </div>
      </Card>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {/* Top Products */}
        <Card className="p-4">
          <h3 className="font-extrabold text-gray-700 mb-3">Top Products</h3>
          {stats.topProducts.length===0
            ? <p className="text-sm text-gray-400">No orders yet</p>
            : <div className="space-y-2">
                {stats.topProducts.map((p,i)=>(
                  <div key={i} className="flex items-center justify-between">
                    <div className="flex items-center gap-2 min-w-0">
                      <span className="w-5 h-5 rounded-lg bg-pink-100 text-pink-600 text-xs font-black flex items-center justify-center flex-shrink-0">{i+1}</span>
                      <span className="text-sm font-semibold text-gray-700 truncate">{p.name}</span>
                    </div>
                    <span className="text-sm font-black text-gray-800 ml-2">{p.qty} pcs</span>
                  </div>
                ))}
              </div>
          }
        </Card>

        {/* Recent Orders */}
        <Card className="p-4">
          <h3 className="font-extrabold text-gray-700 mb-3">Recent Orders</h3>
          {orders.length===0
            ? <p className="text-sm text-gray-400">No orders yet</p>
            : <div className="space-y-2">
                {orders.slice(0,6).map(o=>{
                  const p=catalog.find(c=>c.id===o.productId);
                  return (
                    <div key={o.id} className="flex items-center justify-between gap-2">
                      <div className="min-w-0 flex-1">
                        <p className="text-xs font-bold text-gray-800 truncate">{o.customerName}</p>
                        <p className="text-xs text-gray-400 truncate">{p?`${p.brand} ${p.name}`:'—'}</p>
                      </div>
                      <div className="flex items-center gap-2 flex-shrink-0">
                        <StatusBadge status={o.status}/>
                        <span className="text-xs font-bold text-gray-700">{fmtUZS(o.priceUZS)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
          }
        </Card>
      </div>
    </div>
  );
}

// ORDERS PAGE
// ══════════════════════════════════════════════════════════════
function OrdersPage({orders,setOrders,catalog,settings,notify,updateOrderStatus}) {
  const [statusFilter, setStatusFilter] = useState('All');
  const [search,       setSearch]       = useState('');
  const [showForm,     setShowForm]     = useState(false);
  const [editOrder,    setEditOrder]    = useState(null);
  const [saving,       setSaving]       = useState(false);

  const salespersons = settings.salespersons||[];

  const filtered = useMemo(()=>{
    let list = statusFilter==='All' ? orders : orders.filter(o=>o.status===statusFilter);
    if(search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(o=>{
        const p = catalog.find(c=>c.id===o.productId);
        return o.customerName.toLowerCase().includes(q) || (p&&(`${p.brand} ${p.name}`).toLowerCase().includes(q));
      });
    }
    return list;
  },[orders,statusFilter,search,catalog]);

  const saveOrder = async(data) => {
    setSaving(true);
    try {
      if(editOrder) {
        const {error} = await db.from('orders').update(toDB.order(data)).eq('id',editOrder.id);
        if(error) throw error;
        setOrders(prev=>prev.map(o=>o.id===editOrder.id?{...o,...data}:o));
        notify('Order updated ✓');
      } else {
        const {data:nd,error} = await db.from('orders').insert(toDB.order(data)).select().single();
        if(error) throw error;
        setOrders(prev=>[fromDB.order(nd),...prev]);
        notify('Order created ✓');
      }
      setShowForm(false); setEditOrder(null);
    } catch(e){ notify('Save failed: '+e.message,'error'); }
    finally{ setSaving(false); }
  };

  const deleteOrder = async(id) => {
    if(!confirm('Delete this order?')) return;
    const {error} = await db.from('orders').delete().eq('id',id);
    if(error) return notify('Delete failed','error');
    setOrders(prev=>prev.filter(o=>o.id!==id));
    notify('Order deleted');
  };

  // Procurement: group pending orders for purchase list
  const procurementList = useMemo(()=>{
    const pending = orders.filter(o=>o.status==='Pending');
    const groups  = {};
    pending.forEach(o=>{
      const key = o.productId||'unknown';
      if(!groups[key]) { const p=catalog.find(c=>c.id===o.productId); groups[key]={product:p,orders:[],totalQty:0}; }
      groups[key].orders.push(o);
      groups[key].totalQty += +o.quantity||1;
    });
    return Object.values(groups);
  },[orders,catalog]);

  const markAllPurchased = async() => {
    const pendingIds = orders.filter(o=>o.status==='Pending').map(o=>o.id);
    if(!pendingIds.length) return;
    if(!confirm(`Mark ${pendingIds.length} pending orders as Purchased?`)) return;
    const {error} = await db.from('orders').update({status:'Purchased'}).in('id',pendingIds);
    if(error) return notify('Update failed','error');
    for(const id of pendingIds) {
      const o = orders.find(x=>x.id===id);
      if(o?.productId) await updateOrderStatus(id,'Purchased',o.status);
    }
    setOrders(prev=>prev.map(o=>pendingIds.includes(o.id)?{...o,status:'Purchased'}:o));
    notify(`${pendingIds.length} orders marked as Purchased ✓`);
  };

  return (
    <div className="space-y-4 slide-up">
      {/* Top bar */}
      <div className="flex flex-wrap items-center gap-2">
        <h2 className="font-black text-gray-800 text-xl flex-1">Orders</h2>
        {procurementList.length>0&&(
          <Btn size="sm" variant="outline" onClick={markAllPurchased}>🛒 Mark Pending as Purchased ({orders.filter(o=>o.status==='Pending').length})</Btn>
        )}
        <Btn size="sm" onClick={()=>{setEditOrder(null);setShowForm(true);}}>+ New Order</Btn>
      </div>

      {/* Filters */}
      <div className="flex flex-wrap gap-2 items-center">
        <div className="flex gap-1 overflow-x-auto">
          {['All',...STATUSES].map(s=>{
            const cnt = s==='All'?orders.length:orders.filter(o=>o.status===s).length;
            return (
              <button key={s} onClick={()=>setStatusFilter(s)}
                className={`flex-shrink-0 px-3 py-1 rounded-full text-xs font-bold transition-all ${statusFilter===s?'bg-pink-500 text-white':'bg-white text-gray-500 border border-gray-200 hover:border-pink-300'}`}>
                {s} <span className="opacity-70">({cnt})</span>
              </button>
            );
          })}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search customer or product…"
          className="border border-gray-200 rounded-xl px-3 py-1.5 text-sm bg-white ml-auto w-52"/>
      </div>

      {/* Procurement Summary (only when filtered to Pending) */}
      {statusFilter==='Pending' && procurementList.length>0 && (
        <Card className="p-4">
          <h3 className="font-extrabold text-gray-700 mb-3">🛒 Purchase List</h3>
          <TblWrap>
            <thead><tr>
              <th>Brand</th><th>Product</th><th>Total Qty</th><th>Est. Cost (KRW)</th><th>Orders</th>
            </tr></thead>
            <tbody>
              {procurementList.map((g,i)=>(
                <tr key={i}>
                  <td className="font-semibold text-gray-700">{g.product?.brand||'—'}</td>
                  <td className="text-gray-800">{g.product?.name||'Unknown product'}</td>
                  <td className="font-black text-pink-600">{g.totalQty}</td>
                  <td>{g.product?fmtKRW(((+g.product.estimatedCostKRW||0)+(g.product.weightGrams/1000)*(+settings.shippingRateKRW||15000))*g.totalQty):'—'}</td>
                  <td className="text-gray-400">{g.orders.length} order{g.orders.length!==1?'s':''}</td>
                </tr>
              ))}
            </tbody>
          </TblWrap>
        </Card>
      )}

      {/* Orders Table */}
      {filtered.length===0
        ? <Empty icon="📋" title="No orders found" sub="Create your first order or change the filter" action={<Btn onClick={()=>setShowForm(true)}>+ New Order</Btn>}/>
        : <TblWrap>
            <thead><tr>
              <th>Date</th><th>Customer</th><th>Product</th><th>Qty</th><th>Price (UZS)</th><th>Type</th><th>Status</th><th>Sales</th><th></th>
            </tr></thead>
            <tbody>
              {filtered.map(o=>{
                const p = catalog.find(c=>c.id===o.productId);
                return (
                  <tr key={o.id}>
                    <td className="text-gray-400 text-xs">{fmtDate(o.createdAt)}</td>
                    <td className="font-semibold text-gray-800">{o.customerName}</td>
                    <td className="text-gray-700 max-w-[180px]">
                      {p ? <span className="truncate block" title={`${p.brand} ${p.name}`}><span className="text-xs text-pink-500 font-bold">{p.brand}</span> {p.name}</span> : <span className="text-gray-400 italic">No product</span>}
                    </td>
                    <td className="font-bold text-center">{o.quantity}</td>
                    <td className="font-bold text-gray-800">{fmtUZS(o.priceUZS)}</td>
                    <td><span className={`text-xs px-2 py-0.5 rounded-full font-bold ${o.type==='B2B'?'bg-indigo-100 text-indigo-700':'bg-rose-100 text-rose-700'}`}>{o.type}</span></td>
                    <td><StatusBadge status={o.status} onChange={ns=>updateOrderStatus(o.id,ns,o.status)}/></td>
                    <td className="text-gray-500 text-xs">{o.salesperson||'—'}</td>
                    <td>
                      <div className="flex gap-1">
                        <Btn size="xs" variant="ghost" onClick={()=>{setEditOrder(o);setShowForm(true);}}>✎</Btn>
                        <Btn size="xs" variant="danger" onClick={()=>deleteOrder(o.id)}>✕</Btn>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </TblWrap>
      }

      {showForm&&(
        <OrderForm
          order={editOrder}
          catalog={catalog}
          salespersons={salespersons}
          settings={settings}
          onSave={saveOrder}
          saving={saving}
          onClose={()=>{setShowForm(false);setEditOrder(null);}}
        />
      )}
    </div>
  );
}

function OrderForm({order,catalog,salespersons,settings,onSave,onClose,saving}) {
  const sp = salespersons?.length?salespersons:['—'];
  const [form,setForm] = useState({
    customerName: order?.customerName||'',
    productId:    order?.productId||'',
    quantity:     order?.quantity||1,
    priceUZS:     order?.priceUZS||'',
    type:         order?.type||'B2C',
    status:       order?.status||'Pending',
    salesperson:  order?.salesperson||sp[0]||'',
    notes:        order?.notes||'',
  });
  const [search, setSearch] = useState('');

  const f = (k,v)=>setForm(p=>({...p,[k]:v}));

  // Auto-fill price when product or type changes
  useEffect(()=>{
    if(form.productId && !order) {
      const p = catalog.find(c=>c.id===form.productId);
      if(p) f('priceUZS', form.type==='B2B'?p.suggestedB2BPrice:p.suggestedB2CPrice);
    }
  },[form.productId,form.type]);

  const filteredCatalog = useMemo(()=>{
    if(!search.trim()) return catalog;
    const q=search.toLowerCase();
    return catalog.filter(p=>(`${p.brand} ${p.name}`).toLowerCase().includes(q)||p.category?.toLowerCase().includes(q));
  },[catalog,search]);

  const selectedProduct = catalog.find(c=>c.id===form.productId);

  const submit=()=>{
    if(!form.customerName.trim()) return alert('Customer name required.');
    if(!form.priceUZS||+form.priceUZS<=0) return alert('Enter a price.');
    onSave(form);
  };

  return (
    <Modal title={order?'Edit Order':'New Order'} onClose={onClose} wide>
      <div className="space-y-3">
        <Inp label="Customer Name" required value={form.customerName} onChange={e=>f('customerName',e.target.value)} placeholder="e.g. Nilufar Karimova"/>

        {/* Product Search */}
        <div>
          <label className="block text-xs font-bold text-gray-500 mb-1">Product</label>
          {selectedProduct
            ? <div className="flex items-center gap-2 border border-pink-200 rounded-xl px-3 py-2 bg-pink-50">
                <span className="text-sm font-bold text-gray-800 flex-1 truncate"><span className="text-pink-500">{selectedProduct.brand}</span> {selectedProduct.name}</span>
                <button onClick={()=>{f('productId','');setSearch('');}} className="text-gray-400 hover:text-red-500 font-black text-lg leading-none">×</button>
              </div>
            : <div className="space-y-1.5">
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search product…" className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50"/>
                {search&&(
                  <div className="border border-gray-200 rounded-xl bg-white shadow-lg max-h-44 overflow-y-auto">
                    {filteredCatalog.length===0
                      ? <p className="px-3 py-3 text-sm text-gray-400">No products found</p>
                      : filteredCatalog.slice(0,12).map(p=>(
                          <button key={p.id} onClick={()=>{f('productId',p.id);setSearch('');}}
                            className="w-full text-left px-3 py-2 hover:bg-pink-50 text-sm border-b border-gray-100 last:border-0">
                            <span className="font-bold text-pink-500">{p.brand}</span> {p.name}
                            <span className="text-xs text-gray-400 ml-2">{p.category}</span>
                          </button>
                        ))
                    }
                  </div>
                )}
              </div>
          }
        </div>

        <div className="grid grid-cols-3 gap-3">
          <Inp label="Quantity" required type="number" min="1" value={form.quantity} onChange={e=>f('quantity',e.target.value)} placeholder="1"/>
          <Sel label="Type" value={form.type} onChange={e=>f('type',e.target.value)}>
            <option>B2C</option><option>B2B</option>
          </Sel>
          <Sel label="Status" value={form.status} onChange={e=>f('status',e.target.value)}>
            {STATUSES.map(s=><option key={s}>{s}</option>)}
          </Sel>
        </div>

        <div className="grid grid-cols-2 gap-3">
          <Inp label="Price (UZS)" required type="number" min="0" value={form.priceUZS} onChange={e=>f('priceUZS',e.target.value)} placeholder="Auto-filled from catalog"/>
          <Sel label="Salesperson" value={form.salesperson} onChange={e=>f('salesperson',e.target.value)}>
            {sp.map(s=><option key={s}>{s}</option>)}
          </Sel>
        </div>

        {selectedProduct&&(()=>{
          const shippingKRW = (selectedProduct.weightGrams/1000)*(+settings?.shippingRateKRW||15000);
          const totalCostKRW = (+selectedProduct.estimatedCostKRW||0) + shippingKRW;
          const profit = (+form.priceUZS||0) - totalCostKRW*(+settings?.uzsPerKrw||8);
          return (
            <div className="bg-pink-50 rounded-xl px-3 py-2 text-xs text-gray-600 grid grid-cols-4 gap-2">
              <div><span className="font-bold text-gray-500">Product Cost</span><br/>{fmtKRW(selectedProduct.estimatedCostKRW)}</div>
              <div><span className="font-bold text-gray-500">Shipping (auto)</span><br/>{fmtKRW(shippingKRW)}</div>
              <div><span className="font-bold text-gray-500">Weight</span><br/>{selectedProduct.weightGrams}g</div>
              <div><span className={`font-bold ${profit>=0?'text-green-600':'text-red-500'}`}>Est. Profit</span><br/><span className={profit>=0?'text-green-700':'text-red-600'}>{fmtUZS(profit)}</span></div>
            </div>
          );
        })()}

        <div>
          <label className="block text-xs font-bold text-gray-500 mb-1">Notes</label>
          <textarea value={form.notes} onChange={e=>f('notes',e.target.value)} rows={2} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 resize-none" placeholder="Optional…"/>
        </div>
        <Btn size="lg" onClick={submit} loading={saving}>✓ Save Order</Btn>
      </div>
    </Modal>
  );
}

// CATALOG PAGE
// ══════════════════════════════════════════════════════════════
function CatalogPage({catalog,setCatalog,settings,notify}) {
  const [search,    setSearch]    = useState('');
  const [catFilter, setCatFilter] = useState('All');
  const [showForm,  setShowForm]  = useState(false);
  const [editProd,  setEditProd]  = useState(null);
  const [saving,    setSaving]    = useState(false);

  const filtered = useMemo(()=>{
    let list = catFilter==='All'?catalog:catalog.filter(p=>p.category===catFilter);
    if(search.trim()) {
      const q=search.toLowerCase();
      list=list.filter(p=>(`${p.brand} ${p.name}`).toLowerCase().includes(q)||p.category?.toLowerCase().includes(q)||p.notes?.toLowerCase().includes(q));
    }
    return list;
  },[catalog,search,catFilter]);

  const save = async(data) => {
    setSaving(true);
    try {
      if(editProd) {
        const {error}=await db.from('catalog').update(toDB.catalog(data)).eq('id',editProd.id);
        if(error) throw error;
        setCatalog(prev=>prev.map(p=>p.id===editProd.id?{...p,...data}:p));
        notify('Product updated ✓');
      } else {
        const {data:nd,error}=await db.from('catalog').insert(toDB.catalog(data)).select().single();
        if(error) throw error;
        setCatalog(prev=>[fromDB.catalog(nd),...prev]);
        notify('Product added ✓');
      }
      setShowForm(false); setEditProd(null);
    } catch(e){ notify('Save failed: '+e.message,'error'); }
    finally{ setSaving(false); }
  };

  const del = async(id)=>{
    if(!confirm('Remove this product from catalog?')) return;
    const {error}=await db.from('catalog').delete().eq('id',id);
    if(error) return notify('Delete failed','error');
    setCatalog(prev=>prev.filter(p=>p.id!==id));
    notify('Product removed');
  };

  const cats = ['All',...new Set(catalog.map(p=>p.category).filter(Boolean))];

  return (
    <div className="space-y-4 slide-up">
      <div className="flex flex-wrap items-center gap-2">
        <h2 className="font-black text-gray-800 text-xl flex-1">Product Catalog <span className="text-gray-400 font-semibold text-sm">({catalog.length} items)</span></h2>
        <Btn size="sm" onClick={()=>{setEditProd(null);setShowForm(true);}}>+ Add Product</Btn>
      </div>

      <div className="flex flex-wrap gap-2 items-center">
        <div className="flex gap-1 overflow-x-auto">
          {cats.map(c=>(
            <button key={c} onClick={()=>setCatFilter(c)}
              className={`flex-shrink-0 px-3 py-1 rounded-full text-xs font-bold transition-all ${catFilter===c?'bg-pink-500 text-white':'bg-white text-gray-500 border border-gray-200 hover:border-pink-300'}`}>
              {c}
            </button>
          ))}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search brand, name…"
          className="border border-gray-200 rounded-xl px-3 py-1.5 text-sm bg-white ml-auto w-48"/>
      </div>

      {filtered.length===0
        ? <Empty icon="🗂️" title="No products found" sub="Add products to your catalog" action={<Btn onClick={()=>setShowForm(true)}>+ Add Product</Btn>}/>
        : <TblWrap>
            <thead><tr>
              <th>Brand</th><th>Name</th><th>Category</th><th>Skin</th><th>Weight</th><th>Cost (KRW)</th><th>Ship (KRW)</th><th>B2C Price</th><th>B2C Profit</th><th>B2B Price</th><th>B2B Profit</th><th></th>
            </tr></thead>
            <tbody>
              {filtered.map(p=>{
                const shippingKRW = (p.weightGrams/1000)*(+settings.shippingRateKRW||15000);
                const rate = +settings.uzsPerKrw||8;
                const totalCostKRW = (+p.estimatedCostKRW||0) + shippingKRW;
                const b2cProfit = (+p.suggestedB2CPrice||0) - totalCostKRW*rate;
                const b2bProfit = (+p.suggestedB2BPrice||0) - totalCostKRW*rate;
                return (
                <tr key={p.id}>
                  <td className="font-bold text-pink-600">{p.brand}</td>
                  <td className="font-semibold text-gray-800 max-w-[180px]"><span className="truncate block" title={p.name}>{p.name}</span></td>
                  <td><span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full font-semibold">{p.category||'—'}</span></td>
                  <td className="text-xs text-gray-500">{p.skinType}</td>
                  <td className="text-gray-500 text-xs">{p.weightGrams}g</td>
                  <td className="font-semibold text-gray-700">{fmtKRW(p.estimatedCostKRW)}</td>
                  <td className="text-blue-500 text-xs italic">{fmtKRW(shippingKRW)} <span className="text-gray-300">auto</span></td>
                  <td className="font-bold text-emerald-600">{fmtUZS(p.suggestedB2CPrice)}</td>
                  <td className={`font-bold text-xs ${b2cProfit>=0?'text-emerald-700':'text-red-500'}`}>{fmtUZS(b2cProfit)}</td>
                  <td className="font-bold text-indigo-600">{fmtUZS(p.suggestedB2BPrice)}</td>
                  <td className={`font-bold text-xs ${b2bProfit>=0?'text-indigo-700':'text-red-500'}`}>{fmtUZS(b2bProfit)}</td>
                  <td>
                    <div className="flex gap-1">
                      <Btn size="xs" variant="ghost" onClick={()=>{setEditProd(p);setShowForm(true);}}>✎</Btn>
                      <Btn size="xs" variant="danger" onClick={()=>del(p.id)}>✕</Btn>
                    </div>
                  </td>
                </tr>
                );
              })}
            </tbody>
          </TblWrap>
      }

      {showForm&&<ProductForm product={editProd} settings={settings} onSave={save} saving={saving} onClose={()=>{setShowForm(false);setEditProd(null);}}/>}
    </div>
  );
}

        <div className="grid grid-cols-2 gap-3">
          <Inp label="Product Cost (KRW)" required type="number" min="0" value={form.estimatedCostKRW} onChange={e=>f('estimatedCostKRW',e.target.value)} placeholder="18000"/>

        {/* Auto-calculated profit preview */}
        <div className="grid grid-cols-2 gap-3">
          <div className={`rounded-xl px-3 py-2 ${b2cProfit>=0?'bg-emerald-50 border border-emerald-100':'bg-red-50 border border-red-100'}`}>
            <p className={`text-xs font-bold mb-0.5 ${b2cProfit>=0?'text-emerald-500':'text-red-400'}`}>B2C Profit — auto</p>
            <p className={`text-sm font-black ${b2cProfit>=0?'text-emerald-700':'text-red-600'}`}>{fmtUZS(b2cProfit)}</p>
          </div>
          <div className={`rounded-xl px-3 py-2 ${b2bProfit>=0?'bg-indigo-50 border border-indigo-100':'bg-red-50 border border-red-100'}`}>
            <p className={`text-xs font-bold mb-0.5 ${b2bProfit>=0?'text-indigo-500':'text-red-400'}`}>B2B Profit — auto</p>
            <p className={`text-sm font-black ${b2bProfit>=0?'text-indigo-700':'text-red-600'}`}>{fmtUZS(b2bProfit)}</p>
          </div>
        </div>
        <div>
          <label className="block text-xs font-bold text-gray-500 mb-1">Notes</label>
          <textarea value={form.notes} onChange={e=>f('notes',e.target.value)} rows={2} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 resize-none" placeholder="Best seller, seasonal, etc."/>
        </div>
        <Btn size="lg" onClick={submit} loading={saving}>✓ Save Product</Btn>
      </div>
    </Modal>
  );
}

// ══════════════════════════════════════════════════════════════
// INVENTORY PAGE
// ══════════════════════════════════════════════════════════════
function InventoryPage({inventory,setInventory,catalog,orders,notify,upsertInventory}) {
  const [editQty, setEditQty] = useState({});
  const [saving,  setSaving]  = useState(null);

  // Merge inventory with catalog
  const items = useMemo(()=>{
    return catalog.map(p=>{
      const inv    = inventory.find(i=>i.productId===p.id);
      const pending= orders.filter(o=>o.productId===p.id&&o.status==='Pending').reduce((s,o)=>s+(+o.quantity||0),0);
      const inTransit=orders.filter(o=>o.productId===p.id&&['Purchased','Shipped'].includes(o.status)).reduce((s,o)=>s+(+o.quantity||0),0);
      return {product:p, inStock:inv?.quantity||0, pending, inTransit};
    }).filter(x=>x.inStock>0||x.pending>0||x.inTransit>0);
  },[catalog,inventory,orders]);

  const adjust = async(productId, delta) => {
    setSaving(productId);
    await upsertInventory(productId, delta);
    setSaving(null);
    notify('Stock updated ✓');
  };

  const setManual = async(productId) => {
    const qty = editQty[productId];
    if(qty===undefined||qty==='') return;
    setSaving(productId);
    const {data,error} = await db.from('inventory').upsert({product_id:productId,quantity:Math.max(0,+qty||0),updated_at:new Date().toISOString()},{onConflict:'product_id'}).select().single();
    if(!error&&data) {
      setInventory(prev=>{
        const updated=fromDB.inv(data);
        const exists=prev.find(i=>i.productId===productId);
        return exists?prev.map(i=>i.productId===productId?updated:i):[...prev,updated];
      });
      notify('Stock set ✓');
    }
    setSaving(null);
    setEditQty(prev=>({...prev,[productId]:''}));
  };

  return (
    <div className="space-y-4 slide-up">
      <h2 className="font-black text-gray-800 text-xl">Stock / Inventory</h2>
      <p className="text-sm text-gray-400">Stock increases automatically when orders move to <strong>Purchased</strong>. Adjust manually if needed.</p>

      {items.length===0
        ? <Empty icon="📦" title="No stock yet" sub="Stock is added automatically when orders are marked Purchased"/>
        : <TblWrap>
            <thead><tr>
              <th>Brand</th><th>Product</th><th>In Stock</th><th>Pending Orders</th><th>In Transit</th><th>Adjust</th>
            </tr></thead>
            <tbody>
              {items.map(({product:p,inStock,pending,inTransit})=>(
                <tr key={p.id}>
                  <td className="font-bold text-pink-600">{p.brand}</td>
                  <td className="font-semibold text-gray-800">{p.name}</td>
                  <td>
                    <span className={`font-black text-lg ${inStock>0?'text-green-600':'text-gray-400'}`}>{inStock}</span>
                  </td>
                  <td className="text-amber-600 font-bold">{pending||'—'}</td>
                  <td className="text-violet-600 font-bold">{inTransit||'—'}</td>
                  <td>
                    <div className="flex items-center gap-1">
                      <Btn size="xs" variant="ghost" onClick={()=>adjust(p.id,-1)} disabled={saving===p.id||inStock<=0}>−</Btn>
                      <Btn size="xs" variant="ghost" onClick={()=>adjust(p.id,+1)} disabled={saving===p.id}>+</Btn>
                      <input type="number" value={editQty[p.id]??''} onChange={e=>setEditQty(prev=>({...prev,[p.id]:e.target.value}))}
                        placeholder="Set" className="w-16 border border-gray-200 rounded-lg px-2 py-1 text-xs text-center"/>
                      <Btn size="xs" variant="secondary" onClick={()=>setManual(p.id)} disabled={saving===p.id}>Set</Btn>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </TblWrap>
      }
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// EXPENSES PAGE
// ══════════════════════════════════════════════════════════════
function ExpensesPage({expenses,setExpenses,settings,notify}) {
  const [showForm,  setShowForm]  = useState(false);
  const [editExp,   setEditExp]   = useState(null);
  const [typeFilter,setTypeFilter]= useState('All');
  const [saving,    setSaving]    = useState(false);
  const sp = settings.salespersons||[];

  const filtered = useMemo(()=>{
    const list = typeFilter==='All'?expenses:expenses.filter(e=>e.type===typeFilter);
    return [...list].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  },[expenses,typeFilter]);

  const total = filtered.reduce((s,e)=>s+(+e.amountUZS||0),0);

  const save = async(data)=>{
    setSaving(true);
    try {
      if(editExp){
        const {error}=await db.from('expenses').update(toDB.expense(data)).eq('id',editExp.id);
        if(error) throw error;
        setExpenses(prev=>prev.map(e=>e.id===editExp.id?{...e,...data}:e));
        notify('Expense updated ✓');
      } else {
        const {data:nd,error}=await db.from('expenses').insert(toDB.expense(data)).select().single();
        if(error) throw error;
        setExpenses(prev=>[fromDB.expense(nd),...prev]);
        notify('Expense added ✓');
      }
      setShowForm(false); setEditExp(null);
    } catch(e){ notify('Save failed: '+e.message,'error'); }
    finally{ setSaving(false); }
  };

  const del = async(id)=>{
    if(!confirm('Delete this expense?')) return;
    const {error}=await db.from('expenses').delete().eq('id',id);
    if(error) return notify('Delete failed','error');
    setExpenses(prev=>prev.filter(e=>e.id!==id));
    notify('Expense deleted');
  };

  return (
    <div className="space-y-4 slide-up">
      <div className="flex items-center gap-2">
        <div className="flex-1">
          <h2 className="font-black text-gray-800 text-xl">Expenses</h2>
          <p className="text-xs text-gray-400">Total shown: <span className="font-black text-red-500">{fmtUZS(total)}</span></p>
        </div>
        <Btn size="sm" onClick={()=>{setEditExp(null);setShowForm(true);}}>+ Add</Btn>
      </div>
      <div className="flex gap-1 overflow-x-auto">
        {['All',...EXP_TYPES].map(t=>(
          <button key={t} onClick={()=>setTypeFilter(t)}
            className={`flex-shrink-0 px-3 py-1 rounded-full text-xs font-bold transition-all ${typeFilter===t?'bg-pink-500 text-white':'bg-white text-gray-500 border border-gray-200 hover:border-pink-300'}`}>{t}</button>
        ))}
      </div>
      {filtered.length===0
        ? <Empty icon="💰" title="No expenses" sub="Track salaries, cargo, and operational costs"/>
        : <TblWrap>
            <thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Amount (UZS)</th><th>Paid By</th><th></th></tr></thead>
            <tbody>
              {filtered.map(e=>(
                <tr key={e.id}>
                  <td className="text-gray-400 text-xs">{fmtDate(e.date)}</td>
                  <td><span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full font-bold">{e.type}</span></td>
                  <td className="font-semibold text-gray-800">{e.description}</td>
                  <td className="font-black text-red-500">{fmtUZS(e.amountUZS)}</td>
                  <td className="text-gray-500 text-xs">{e.paidBy||'—'}</td>
                  <td><div className="flex gap-1">
                    <Btn size="xs" variant="ghost" onClick={()=>{setEditExp(e);setShowForm(true);}}>✎</Btn>
                    <Btn size="xs" variant="danger" onClick={()=>del(e.id)}>✕</Btn>
                  </div></td>
                </tr>
              ))}
            </tbody>
          </TblWrap>
      }
      {showForm&&(
        <Modal title={editExp?'Edit Expense':'New Expense'} onClose={()=>{setShowForm(false);setEditExp(null);}}>
          <ExpenseForm expense={editExp} onSave={save} saving={saving} salespersons={sp}/>
        </Modal>
      )}
    </div>
  );
}

function ExpenseForm({expense,onSave,saving,salespersons}) {
  const sp=salespersons?.length?salespersons:[];
  const [form,setForm]=useState({date:expense?.date||today(),type:expense?.type||'Salary',description:expense?.description||'',amountUZS:expense?.amountUZS||'',paidBy:expense?.paidBy||sp[0]||''});
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  return (
    <div className="space-y-3">
      <div className="grid grid-cols-2 gap-3">
        <Inp label="Date" required type="date" value={form.date} onChange={e=>f('date',e.target.value)}/>
        <Sel label="Type" required value={form.type} onChange={e=>f('type',e.target.value)}>{EXP_TYPES.map(t=><option key={t}>{t}</option>)}</Sel>
      </div>
      <Inp label="Description" required value={form.description} onChange={e=>f('description',e.target.value)} placeholder="e.g. Monthly cargo fee"/>
      <Inp label="Amount (UZS)" required type="number" min="0" value={form.amountUZS} onChange={e=>f('amountUZS',e.target.value)} placeholder="500000"/>
      <div>
        <label className="block text-xs font-bold text-gray-500 mb-1">Paid By</label>
        <input list="sp-list" value={form.paidBy} onChange={e=>f('paidBy',e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50" placeholder="Name"/>
        <datalist id="sp-list">{sp.map(s=><option key={s} value={s}/>)}</datalist>
      </div>
      <Btn size="lg" onClick={()=>{if(!form.description.trim()||!form.amountUZS)return alert('Fill required fields.');onSave(form);}} loading={saving}>✓ Save Expense</Btn>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// SETTINGS PAGE
// ══════════════════════════════════════════════════════════════
function SettingsPage({settings,setSettings,notify}) {
  const [shipRate, setShipRate] = useState(settings.shippingRateKRW||15000);
  const [uzsPerKrw,setUzsPerKrw]= useState(settings.uzsPerKrw||8);
  const [spTxt,    setSpTxt]    = useState((settings.salespersons||[]).join(', '));

  const save=()=>{
    setSettings({...settings, shippingRateKRW:+shipRate, uzsPerKrw:+uzsPerKrw, salespersons:spTxt.split(',').map(s=>s.trim()).filter(Boolean)});
    notify('Settings saved ✓');
  };

  return (
    <div className="max-w-lg space-y-4 slide-up">
      <h2 className="font-black text-gray-800 text-xl">Settings</h2>
      <Card className="p-4 space-y-4">
        <p className="font-extrabold text-gray-700">Rates & Currency</p>

        <div>
          <Inp label="Shipping Rate (KRW per kg)" type="number" min="0" value={shipRate} onChange={e=>setShipRate(e.target.value)} placeholder="15000"/>
          <p className="text-xs text-gray-400 mt-1">
            Example: 100g product → ₩{Math.round((100/1000)*(+shipRate||15000)).toLocaleString()} shipping &nbsp;·&nbsp;
            500g → ₩{Math.round((500/1000)*(+shipRate||15000)).toLocaleString()}
          </p>
        </div>

        <div>
          <Inp label="Exchange Rate (UZS per 1 KRW)" type="number" min="0" step="0.1" value={uzsPerKrw} onChange={e=>setUzsPerKrw(e.target.value)} placeholder="8"/>
          <p className="text-xs text-gray-400 mt-1">
            ₩1,000 = {Math.round(1000*(+uzsPerKrw||8)).toLocaleString()} UZS &nbsp;·&nbsp;
            ₩10,000 = {Math.round(10000*(+uzsPerKrw||8)).toLocaleString()} UZS
          </p>
        </div>
      </Card>
      <Card className="p-4 space-y-3">
        <p className="font-extrabold text-gray-700">Team (Salespersons)</p>
        <div>
          <label className="block text-xs font-bold text-gray-500 mb-1">Names (comma-separated)</label>
          <textarea value={spTxt} onChange={e=>setSpTxt(e.target.value)} rows={2} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 resize-none" placeholder="Amir, Zara, Dina…"/>
        </div>
      </Card>
      <Btn size="lg" onClick={save}>✓ Save Settings</Btn>
      <Card className="p-4">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center text-white font-black">M</div>
          <div>
            <p className="font-black text-gray-800">Muna Manager</p>
            <p className="text-xs text-gray-400">v3.0 · K-Beauty Business System · Supabase</p>
          </div>
        </div>
      </Card>
    </div>
  );
}
