// ─── CALCULATION ──────────────────────────────────────────────────────────────
const calcOrder = (order, items, krwToUsd) => {
  const its          = items.filter(i => i.orderId === order.id);
  const totalCostKRW = its.reduce((s,i) => s + (+i.purchaseCostKRW||0)*(+i.quantity||0), 0);
  const totalCostUSD = totalCostKRW * (+krwToUsd||0);
  const totalWeightKg= its.reduce((s,i) => s + (+i.weightKg||0)*(+i.quantity||0), 0);
  const shippingCost = totalWeightKg * (+order.shippingRatePerKg||0);
  const sellingPrice = +order.sellingPriceUSD||0;
  const profit       = sellingPrice - totalCostUSD - shippingCost;
  return { orderItems:its, totalCostKRW, totalCostUSD, totalWeightKg, shippingCost, sellingPrice, profit };
};

const Btn = ({ children, onClick, variant='primary', size='md', className='', type='button', disabled=false, loading=false }) => {

    primary:  'bg-purple-800 hover:bg-purple-900 text-white shadow-sm shadow-purple-200',
    secondary:'bg-purple-50 hover:bg-purple-100 text-purple-800',
    danger:   'bg-red-50 hover:bg-red-100 text-red-600',

    outline:  'border-2 border-purple-200 text-purple-700 hover:bg-purple-50',
  };

    <button type={type} onClick={onClick} disabled={disabled||loading}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [customers,  setCustomers]  = useState([]);
  const [orders,     setOrders]     = useState([]);
  const [orderItems, setOrderItems] = useState([]);
  const [expenses,   setExpenses]   = useState([]);
  const [settings,   setSettingsS]  = useState(getSettings);
  const [loading,    setLoading]    = useState(true);
  const [toast,      setToast]      = useState({ msg:'', type:'info' });
  const [page,       setPage]       = useState('dashboard');
  const [viewOrderId,setViewOrderId]= useState(null);
  const toastTimer = useRef(null);

  const notify = (msg, type='success') => {
    clearTimeout(toastTimer.current);
    setToast({ msg, type });
    toastTimer.current = setTimeout(() => setToast({ msg:'', type:'info' }), 2500);
  };

  useEffect(() => {
    (async () => {
      try {
        const [c, o, oi, e] = await Promise.all([
          db.from('customers').select('*').order('created_at', { ascending: false }),
          db.from('orders').select('*').order('created_at', { ascending: false }),
          db.from('order_items').select('*'),
          db.from('expenses').select('*').order('date', { ascending: false }),
        ]);
        if (c.error || o.error || oi.error || e.error) throw new Error('Failed to load data');
        setCustomers(c.data.map(fromDB.customer));
        setOrders(o.data.map(fromDB.order));
        setOrderItems(oi.data.map(fromDB.orderItem));
        setExpenses(e.data.map(fromDB.expense));
      } catch(err) {
        notify('Could not connect to database. Check your Supabase keys.', 'error');
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const updateSettings = s => { setSettingsS(s); saveSettings(s); };
  const navTo    = p  => { setPage(p); setViewOrderId(null); };
  const openOrder = id => { setViewOrderId(id); setPage('orderDetail'); };

  const stats = useMemo(() => {
    const kr = settings.krwToUsd;
    const delivered     = orders.filter(o => o.status === 'Delivered');
    const totalRevenue  = delivered.reduce((s,o) => s + (+o.sellingPriceUSD||0), 0);
    const totalCostUSD  = orders.reduce((s,o) => {
      const its = orderItems.filter(i => i.orderId === o.id);
      return s + its.reduce((a,i) => a + (+i.purchaseCostKRW||0)*(+i.quantity||0), 0) * kr;
    }, 0);
    const totalShipping = orders.reduce((s,o) => {
      const wt = orderItems.filter(i=>i.orderId===o.id).reduce((a,i)=>a+(+i.weightKg||0)*(+i.quantity||0),0);
      return s + wt*(+o.shippingRatePerKg||0);
    }, 0);
    const totalExpenses = expenses.reduce((s,e) => s+(+e.amountUSD||0), 0);
    const grossProfit   = totalRevenue - totalCostUSD - totalShipping;
    const netProfit     = grossProfit - totalExpenses;
    return { totalRevenue, totalExpenses, grossProfit, netProfit, totalOrders: orders.length };
  }, [orders, orderItems, expenses, settings.krwToUsd]);

  if (loading) return (
    <div className="min-h-screen flex flex-col items-center justify-center gap-5" style={{background:'#F7F4F0'}}>
      <MunaLogo size={64} />
      <div className="w-8 h-8 border-4 border-purple-200 border-t-purple-800 rounded-full animate-spin"/>
      <p className="text-sm font-semibold text-purple-400">Loading your data…</p>
    </div>
  );

  const renderPage = () => {
    if (page === 'orderDetail' && viewOrderId) return (
      <OrderDetail orderId={viewOrderId} orders={orders} setOrders={setOrders}
        orderItems={orderItems} setOrderItems={setOrderItems}
        customers={customers} settings={settings} notify={notify} onBack={() => navTo('orders')} />
    );
    switch(page) {
      case 'dashboard': return <Dashboard stats={stats} orders={orders} customers={customers} orderItems={orderItems} settings={settings} onViewOrder={openOrder} onNav={navTo} />;
      case 'orders':    return <OrdersPage orders={orders} setOrders={setOrders} customers={customers} setCustomers={setCustomers} orderItems={orderItems} settings={settings} onView={openOrder} salespersons={settings.salespersons} notify={notify} />;
      case 'customers': return <CustomersPage customers={customers} setCustomers={setCustomers} orders={orders} notify={notify} />;
      case 'expenses':  return <ExpensesPage expenses={expenses} setExpenses={setExpenses} salespersons={settings.salespersons} notify={notify} />;
      case 'settings':  return <SettingsPage settings={settings} setSettings={updateSettings} notify={notify} />;
      default: return null;
    }
  };

  return (
    <div className="min-h-screen pb-24" style={{background:'#F7F4F0'}}>
      <Toast msg={toast.msg} type={toast.type} />

      {page !== 'orderDetail' && (
        <header className="bg-white border-b border-purple-100 sticky top-0 z-30 shadow-sm">
          <div className="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
            <MunaLogo size={38} />
            <div>
              <h1 className="font-black text-purple-950 text-base leading-none tracking-tight">Muna Manager</h1>
              <p className="text-xs text-purple-400 font-semibold mt-0.5">K-Beauty · Uzbekistan</p>
            </div>
          </div>
        </header>
      )}

      <main className="max-w-2xl mx-auto">{renderPage()}</main>

      {page !== 'orderDetail' && (
        <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-purple-100 safe-bottom z-40 shadow-[0_-4px_16px_rgba(109,40,217,0.06)]">
          <div className="max-w-2xl mx-auto flex">
            {[
              { key:'dashboard', label:'Home',      icon:Ico.dashboard },
              { key:'orders',    label:'Orders',    icon:Ico.orders },
              { key:'customers', label:'Clients',   icon:Ico.customers },
              { key:'expenses',  label:'Expenses',  icon:Ico.expenses },
              { key:'settings',  label:'Settings',  icon:Ico.settings },
            ].map(n => (
              <button key={n.key} onClick={() => navTo(n.key)}
                className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 text-xs font-bold transition-colors ${page===n.key?'text-purple-700':'text-gray-400 hover:text-purple-500'}`}>
                {n.icon}{n.label}
              </button>
            ))}
          </div>
        </nav>
      )}
    </div>
  );
}

          <div className="space-y-2">
            {recent.map(order => {
              const customer = customers.find(c => c.id === order.customerId);
              const { profit } = calcOrder(order, orderItems, settings.krwToUsd);
              return (
                <Card key={order.id} onClick={() => onViewOrder(order.id)} className="hover:border-purple-200">
                  <div className="flex items-center justify-between">
                    <div className="flex-1 min-w-0">

                      <p className="text-xs text-purple-400 font-medium">{fmtDate(order.createdAt)}</p>

                    <div className="text-right ml-3">
                      <p className="font-black text-purple-950">{fmtUSD(order.sellingPriceUSD)}</p>

// ═══════════════════════════════════════════════════════════════════════════════
// ORDERS PAGE
// ═══════════════════════════════════════════════════════════════════════════════
function OrdersPage({ orders, setOrders, customers, setCustomers, orderItems, settings, onView, salespersons, notify }) {
  const [filter,   setFilter]   = useState('All');
  const [showForm, setShowForm] = useState(false);
  const [editId,   setEditId]   = useState(null);
  const [saving,   setSaving]   = useState(false);

  const filtered = useMemo(() => {
    const list = filter==='All' ? orders : orders.filter(o=>o.status===filter);
    return [...list].sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
  }, [orders, filter]);

  const saveOrder = async (data) => {
    setSaving(true);
    try {
      let customerId = data.customerId;
      if (!customerId && data.newCustomerName?.trim()) {
        const { data: nc, error } = await db.from('customers').insert({ name: data.newCustomerName.trim() }).select().single();
        if (error) throw error;
        const mapped = fromDB.customer(nc);
        setCustomers(prev => [mapped, ...prev]);
        customerId = mapped.id;
      }
      const payload = toDB.order({ ...data, customerId });
      if (editId) {
        const { error } = await db.from('orders').update(payload).eq('id', editId);
        if (error) throw error;
        setOrders(prev => prev.map(o => o.id===editId ? { ...o, ...data, customerId } : o));
        notify('Order updated ✓');
      } else {
        const { data: nd, error } = await db.from('orders').insert(payload).select().single();
        if (error) throw error;
        setOrders(prev => [fromDB.order(nd), ...prev]);
        notify('Order created ✓');
      }
      setShowForm(false); setEditId(null);
    } catch(e) {
      notify('Save failed: ' + e.message, 'error');
    } finally { setSaving(false); }
  };

  const deleteOrder = async id => {
    if (!confirm('Delete this order and all its items?')) return;
    const { error } = await db.from('orders').delete().eq('id', id);
    if (error) return notify('Delete failed', 'error');
    setOrders(prev => prev.filter(o => o.id!==id));
    notify('Order deleted');
  };

  return (
    <div className="px-4 py-5 slide-up">
      <div className="flex items-center justify-between mb-4">
        <h2 className="font-black text-purple-950 text-xl">Orders</h2>
        <Btn onClick={() => { setEditId(null); setShowForm(true); }}>{Ico.plus} New Order</Btn>
      </div>
      <div className="flex gap-2 overflow-x-auto pb-2 mb-4 -mx-4 px-4">
        {['All',...STATUSES].map(s => (
          <button key={s} onClick={() => setFilter(s)}
            className={`flex-shrink-0 px-3.5 py-1.5 rounded-full text-xs font-bold transition-all ${filter===s?'bg-purple-800 text-white shadow-sm':'bg-white text-purple-500 border-2 border-purple-100 hover:border-purple-300'}`}>
            {s} ({s==='All'?orders.length:orders.filter(o=>o.status===s).length})
          </button>
        ))}
      </div>
      {filtered.length === 0 ? (
        <EmptyState icon="📋" title="No orders" sub="Create your first order" action={<Btn onClick={() => setShowForm(true)}>{Ico.plus} New Order</Btn>} />
      ) : (
        <div className="space-y-3">
          {filtered.map(order => {
            const customer = customers.find(c => c.id===order.customerId);
            const { totalCostUSD, shippingCost, profit, totalWeightKg } = calcOrder(order, orderItems, settings.krwToUsd);
            return (
              <Card key={order.id} className="card-hover">
                <div className="flex items-start justify-between mb-3">
                  <div>
                    <div className="flex items-center gap-2 mb-1.5"><Badge status={order.status} /><span className="text-xs bg-purple-50 text-purple-700 px-2 py-0.5 rounded-full font-bold">{order.type}</span></div>
                    <p className="font-extrabold text-purple-950">{customer?.name||'Unknown Customer'}</p>
                    <p className="text-xs text-purple-400 font-semibold">{order.salesperson} · {fmtDate(order.createdAt)}</p>
                  </div>
                  <div className="text-right">
                    <p className="font-black text-purple-950 text-lg">{fmtUSD(order.sellingPriceUSD)}</p>
                    <p className={`text-sm font-bold ${profit>=0?'text-emerald-600':'text-red-500'}`}>{profit>=0?'+':''}{fmtUSD(profit)} profit</p>
                  </div>
                </div>
                <div className="grid grid-cols-3 gap-2 text-center bg-purple-50 rounded-xl p-2.5 mb-3 text-xs">
                  <div><p className="text-purple-400 font-semibold">Cost</p><p className="font-bold text-purple-900">{fmtUSD(totalCostUSD)}</p></div>
                  <div><p className="text-purple-400 font-semibold">Shipping</p><p className="font-bold text-purple-900">{fmtUSD(shippingCost)}</p></div>
                  <div><p className="text-purple-400 font-semibold">Weight</p><p className="font-bold text-purple-900">{fmtKg(totalWeightKg)}</p></div>
                </div>
                <div className="flex gap-2">
                  <Btn size="sm" variant="secondary" onClick={() => onView(order.id)} className="flex-1">View Details</Btn>
                  <Btn size="sm" variant="ghost" onClick={() => { setEditId(order.id); setShowForm(true); }}>{Ico.edit}</Btn>
                  <Btn size="sm" variant="danger" onClick={() => deleteOrder(order.id)}>{Ico.trash}</Btn>
                </div>
              </Card>
            );
          })}
        </div>
      )}
      {showForm && (
        <OrderFormModal order={editId?orders.find(o=>o.id===editId):null} customers={customers} salespersons={salespersons} onSave={saveOrder} saving={saving} onClose={() => { setShowForm(false); setEditId(null); }} />
      )}
    </div>
  );
}

function OrderFormModal({ order, customers, salespersons, onSave, onClose, saving }) {
  const sp = salespersons?.length ? salespersons : ['—'];
  const [form, setForm] = useState({
    customerId: order?.customerId||'', newCustomerName:'',
    salesperson: order?.salesperson||sp[0],
    type: order?.type||'B2C', status: order?.status||'New',
    sellingPriceUSD: order?.sellingPriceUSD||'',
    shippingRatePerKg: order?.shippingRatePerKg||'',
    notes: order?.notes||'',
  });
  const [addingCust, setAddingCust] = useState(false);
  const f = (k,v) => setForm(p => ({ ...p, [k]:v }));
  const submit = () => {
    if (!form.customerId && !form.newCustomerName.trim()) return alert('Select or add a customer.');
    if (!form.sellingPriceUSD) return alert('Enter a selling price.');
    onSave(form);
  };
  return (
    <Modal title={order?'Edit Order':'New Order'} onClose={onClose}>
      <div className="space-y-3">
        <div>
          <label className="block text-xs font-bold text-purple-800 mb-1.5">Customer <span className="text-red-400">*</span></label>
          {!addingCust ? (
            <div className="flex gap-2">
              <select value={form.customerId} onChange={e=>f('customerId',e.target.value)} className="flex-1 border-2 border-purple-100 rounded-xl px-3.5 py-2.5 text-sm bg-purple-50/30 font-medium">
                <option value="">— Select customer —</option>
                {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              <Btn size="sm" variant="outline" onClick={() => setAddingCust(true)}>+ New</Btn>
            </div>
          ) : (
            <div className="flex gap-2">
              <input value={form.newCustomerName} onChange={e=>f('newCustomerName',e.target.value)} placeholder="New customer name" className="flex-1 border-2 border-purple-100 rounded-xl px-3.5 py-2.5 text-sm bg-purple-50/30 font-medium" />
              <Btn size="sm" variant="ghost" onClick={() => setAddingCust(false)}>Cancel</Btn>
            </div>
          )}
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Sel label="Salesperson" value={form.salesperson} onChange={e=>f('salesperson',e.target.value)}>{sp.map(s=><option key={s}>{s}</option>)}</Sel>
          <Sel label="Type" value={form.type} onChange={e=>f('type',e.target.value)}><option>B2C</option><option>B2B</option></Sel>
        </div>
        <Sel label="Status" value={form.status} onChange={e=>f('status',e.target.value)}>{STATUSES.map(s=><option key={s}>{s}</option>)}</Sel>
        <Input label="Selling Price (USD)" type="number" min="0" step="0.01" required value={form.sellingPriceUSD} onChange={e=>f('sellingPriceUSD',e.target.value)} placeholder="e.g. 150.00" />
        <Input label="Shipping Rate (USD/kg)" type="number" min="0" step="0.01" value={form.shippingRatePerKg} onChange={e=>f('shippingRatePerKg',e.target.value)} placeholder="e.g. 5.00" />
        <div>
          <label className="block text-xs font-bold text-purple-800 mb-1.5">Notes</label>
          <textarea value={form.notes} onChange={e=>f('notes',e.target.value)} rows={2} className="w-full border-2 border-purple-100 rounded-xl px-3.5 py-2.5 text-sm bg-purple-50/30 resize-none font-medium" placeholder="Optional notes…" />
        </div>
        <Btn size="lg" onClick={submit} loading={saving}>{Ico.check} Save Order</Btn>
      </div>
    </Modal>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ORDER DETAIL
// ═══════════════════════════════════════════════════════════════════════════════
function OrderDetail({ orderId, orders, setOrders, orderItems, setOrderItems, customers, settings, notify, onBack }) {
  const order = orders.find(o => o.id===orderId);
  const [showItemForm, setShowItemForm] = useState(false);
  const [editItem,     setEditItem]     = useState(null);
  const [showEdit,     setShowEdit]     = useState(false);
  const [saving,       setSaving]       = useState(false);

  if (!order) return <div className="p-4 text-center text-purple-400 font-semibold">Order not found.</div>;

  const customer = customers.find(c => c.id===order.customerId);
  const { orderItems: items, totalCostKRW, totalCostUSD, totalWeightKg, shippingCost, sellingPrice, profit } = calcOrder(order, orderItems, settings.krwToUsd);

  const updateStatus = async status => {
    const { error } = await db.from('orders').update({ status }).eq('id', orderId);
    if (error) return notify('Update failed', 'error');
    setOrders(prev => prev.map(o => o.id===orderId ? { ...o, status } : o));
    notify(`Status → ${status}`);
  };

  const saveItem = async data => {
    setSaving(true);
    try {
      const payload = toDB.orderItem({ ...data, orderId });
      if (editItem) {
        const { error } = await db.from('order_items').update(payload).eq('id', editItem.id);
        if (error) throw error;
        setOrderItems(prev => prev.map(i => i.id===editItem.id ? { ...i, ...data, orderId } : i));
        notify('Item updated ✓');
      } else {
        const { data: nd, error } = await db.from('order_items').insert(payload).select().single();
        if (error) throw error;
        setOrderItems(prev => [...prev, fromDB.orderItem(nd)]);
        notify('Item added ✓');
      }
      setShowItemForm(false); setEditItem(null);
    } catch(e) { notify('Save failed: '+e.message,'error'); }
    finally { setSaving(false); }
  };

  const deleteItem = async id => {
    if (!confirm('Remove this item?')) return;
    const { error } = await db.from('order_items').delete().eq('id', id);
    if (error) return notify('Delete failed', 'error');
    setOrderItems(prev => prev.filter(i => i.id!==id));
    notify('Item removed');
  };

  const saveOrderEdit = async data => {
    setSaving(true);
    try {
      const { error } = await db.from('orders').update(toDB.order({ ...data, customerId: order.customerId })).eq('id', orderId);
      if (error) throw error;
      setOrders(prev => prev.map(o => o.id===orderId ? { ...o, ...data } : o));
      notify('Order updated ✓');
      setShowEdit(false);
    } catch(e) { notify('Save failed: '+e.message,'error'); }
    finally { setSaving(false); }
  };

  return (
    <div className="slide-up">
      <header className="bg-white border-b border-purple-100 sticky top-0 z-30 shadow-sm">
        <div className="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
          <button onClick={onBack} className="p-2 rounded-xl bg-purple-50 text-purple-700 hover:bg-purple-100 transition-colors">{Ico.back}</button>
          <div className="flex-1 min-w-0">
            <h1 className="font-black text-purple-950 truncate">{customer?.name||'Unknown'}</h1>
            <div className="flex items-center gap-2"><Badge status={order.status} /><span className="text-xs text-purple-400 font-semibold">{order.type} · {fmtDate(order.createdAt)}</span></div>
          </div>
          <Btn size="sm" variant="ghost" onClick={() => setShowEdit(true)}>{Ico.edit}</Btn>
        </div>
      </header>

      <div className="px-4 py-5 space-y-4 max-w-2xl mx-auto">
        {/* Financials */}
        <div className="muna-gradient rounded-2xl p-5 text-white shadow-lg">
          <div className="grid grid-cols-2 gap-3">
            <div><p className="text-xs opacity-60 font-semibold">Selling Price</p><p className="text-2xl font-black">{fmtUSD(sellingPrice)}</p></div>
            <div className="text-right"><p className="text-xs opacity-60 font-semibold">Profit</p><p className={`text-2xl font-black ${profit<0?'text-red-300':''}`}>{profit>=0?'+':''}{fmtUSD(profit)}</p></div>
          </div>
          <div className="mt-4 pt-4 border-t border-white/20 grid grid-cols-3 gap-2 text-xs text-center">
            <div><p className="opacity-50 font-semibold">Product Cost</p><p className="font-black">{fmtUSD(totalCostUSD)}</p><p className="opacity-40 text-[10px]">{fmtKRW(totalCostKRW)}</p></div>
            <div><p className="opacity-50 font-semibold">Shipping</p><p className="font-black">{fmtUSD(shippingCost)}</p><p className="opacity-40 text-[10px]">{fmtKg(totalWeightKg)}</p></div>
            <div><p className="opacity-50 font-semibold">Margin</p><p className="font-black">{sellingPrice>0?((profit/sellingPrice)*100).toFixed(1):0}%</p></div>
          </div>
        </div>

        {/* Status */}
        <Card>
          <p className="text-xs font-bold text-purple-400 mb-3">Order Status</p>
          <div className="flex items-center gap-1 mb-4">
            {STATUSES.map((s,i) => {
              const idx = STATUSES.indexOf(order.status);
              const active = i <= idx;
              return (
                <React.Fragment key={s}>
                  <div className={`flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-xs font-black ${active?'bg-purple-800 text-white':'bg-purple-50 text-purple-300'}`}>
                    {i<idx ? Ico.check : i+1}
                  </div>
                  {i<STATUSES.length-1 && <div className={`flex-1 h-1 rounded-full ${i<idx?'bg-purple-800':'bg-purple-100'}`}/>}
                </React.Fragment>
              );
            })}
          </div>
          <div className="flex gap-1.5 flex-wrap">
            {STATUSES.map(s => (
              <button key={s} onClick={() => updateStatus(s)}
                className={`px-3 py-1.5 rounded-xl text-xs font-bold transition-colors ${order.status===s?'bg-purple-800 text-white':'bg-purple-50 text-purple-700 hover:bg-purple-100'}`}>{s}</button>
            ))}
          </div>
        </Card>

        {/* Details */}
        <Card>
          <p className="text-xs font-bold text-purple-400 mb-3">Details</p>
          <div className="space-y-2 text-sm">
            <div className="flex justify-between"><span className="text-purple-400 font-semibold">Salesperson</span><span className="font-bold text-purple-950">{order.salesperson}</span></div>
            <div className="flex justify-between"><span className="text-purple-400 font-semibold">Shipping Rate</span><span className="font-bold text-purple-950">{fmtUSD(order.shippingRatePerKg)}/kg</span></div>
            {order.notes&&<div className="flex justify-between"><span className="text-purple-400 font-semibold">Notes</span><span className="font-bold text-purple-950 text-right max-w-[60%]">{order.notes}</span></div>}
          </div>
        </Card>

        {/* Items */}
        <div>
          <div className="flex items-center justify-between mb-3">
            <div>
              <h3 className="font-black text-purple-950">Products</h3>
              <p className="text-xs text-purple-400 font-semibold">{items.length} item{items.length!==1?'s':''} · {fmtKg(totalWeightKg)} total</p>
            </div>
            <Btn size="sm" onClick={() => { setEditItem(null); setShowItemForm(true); }}>{Ico.plus} Add Item</Btn>
          </div>
          {items.length === 0 ? (
            <Card><EmptyState icon="📦" title="No products yet" sub="Add items to this order" action={<Btn size="sm" onClick={() => setShowItemForm(true)}>{Ico.plus} Add Item</Btn>} /></Card>
          ) : (
            <div className="space-y-2">
              {items.map(item => {
                const itemCostKRW = (+item.purchaseCostKRW||0)*(+item.quantity||0);
                const itemCostUSD = itemCostKRW*(settings.krwToUsd||0);
                const itemWeight  = (+item.weightKg||0)*(+item.quantity||0);
                return (
                  <Card key={item.id}>
                    <div className="flex items-start justify-between mb-2">
                      <div className="flex-1 min-w-0">
                        <p className="font-extrabold text-purple-950 truncate">{item.productName}</p>
                        <p className="text-xs text-purple-400 font-semibold">Qty: {item.quantity} · {fmtKRW(item.purchaseCostKRW)}/unit · {item.weightKg}kg/unit</p>
                      </div>
                      <div className="flex gap-1 ml-2">
                        <button onClick={() => { setEditItem(item); setShowItemForm(true); }} className="p-1.5 text-purple-300 hover:text-purple-700 rounded-lg hover:bg-purple-50 transition-colors">{Ico.edit}</button>
                        <button onClick={() => deleteItem(item.id)} className="p-1.5 text-purple-300 hover:text-red-500 rounded-lg hover:bg-red-50 transition-colors">{Ico.trash}</button>
                      </div>
                    </div>
                    <div className="grid grid-cols-3 gap-2 bg-purple-50 rounded-xl p-2.5 text-xs text-center">
                      <div><p className="text-purple-400 font-semibold">Total KRW</p><p className="font-bold text-purple-900">{fmtKRW(itemCostKRW)}</p></div>
                      <div><p className="text-purple-400 font-semibold">Total USD</p><p className="font-bold text-purple-900">{fmtUSD(itemCostUSD)}</p></div>
                      <div><p className="text-purple-400 font-semibold">Total Weight</p><p className="font-bold text-purple-900">{fmtKg(itemWeight)}</p></div>
                    </div>
                  </Card>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {showItemForm && <ItemFormModal item={editItem} onSave={saveItem} saving={saving} onClose={() => { setShowItemForm(false); setEditItem(null); }} />}
      {showEdit && <OrderFormModal order={order} customers={customers} salespersons={[order.salesperson]} onSave={saveOrderEdit} saving={saving} onClose={() => setShowEdit(false)} />}
    </div>
  );
}

function ItemFormModal({ item, onSave, onClose, saving }) {
  const [form, setForm] = useState({ productName:item?.productName||'', quantity:item?.quantity||'', purchaseCostKRW:item?.purchaseCostKRW||'', weightKg:item?.weightKg||'' });
  const f = (k,v) => setForm(p=>({...p,[k]:v}));
  const totalKRW = (+form.purchaseCostKRW||0)*(+form.quantity||0);
  const totalWt  = (+form.weightKg||0)*(+form.quantity||0);
  const submit = () => {
    if (!form.productName.trim()) return alert('Enter product name.');
    if (!form.quantity||+form.quantity<=0) return alert('Enter valid quantity.');
    if (!form.purchaseCostKRW||+form.purchaseCostKRW<=0) return alert('Enter purchase cost in KRW.');
    onSave(form);
  };
  return (
    <Modal title={item?'Edit Product':'Add Product'} onClose={onClose}>
      <div className="space-y-3">
        <Input label="Product Name" required value={form.productName} onChange={e=>f('productName',e.target.value)} placeholder="e.g. COSRX Snail Cream" />
        <div className="grid grid-cols-2 gap-3">
          <Input label="Quantity" required type="number" min="1" value={form.quantity} onChange={e=>f('quantity',e.target.value)} placeholder="1" />
          <Input label="Cost per unit (KRW)" required type="number" min="0" value={form.purchaseCostKRW} onChange={e=>f('purchaseCostKRW',e.target.value)} placeholder="15000" />
        </div>
        <Input label="Weight per unit (kg)" type="number" min="0" step="0.001" value={form.weightKg} onChange={e=>f('weightKg',e.target.value)} placeholder="0.150" />
        {(form.quantity&&form.purchaseCostKRW) && (
          <div className="bg-purple-50 rounded-xl p-3 text-sm border border-purple-100">
            <p className="text-xs font-bold text-purple-600 mb-1.5">Auto-calculated</p>
            <div className="flex justify-between text-purple-700"><span className="font-semibold">Total Cost</span><span className="font-black">{fmtKRW(totalKRW)}</span></div>
            {form.weightKg&&<div className="flex justify-between text-purple-700 mt-1"><span className="font-semibold">Total Weight</span><span className="font-black">{fmtKg(totalWt)}</span></div>}
          </div>
        )}
        <Btn size="lg" onClick={submit} loading={saving}>{Ico.check} Save Product</Btn>
      </div>
    </Modal>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// CUSTOMERS
// ═══════════════════════════════════════════════════════════════════════════════
function CustomersPage({ customers, setCustomers, orders, notify }) {
  const [showForm, setShowForm] = useState(false);
  const [editId,   setEditId]   = useState(null);
  const [search,   setSearch]   = useState('');
  const [saving,   setSaving]   = useState(false);

  const filtered = useMemo(() => customers.filter(c => c.name.toLowerCase().includes(search.toLowerCase())||c.phone?.includes(search)), [customers, search]);

  const save = async data => {
    setSaving(true);
    try {
      if (editId) {
        const { error } = await db.from('customers').update(toDB.customer(data)).eq('id', editId);
        if (error) throw error;
        setCustomers(prev => prev.map(c => c.id===editId ? { ...c, ...data } : c));
        notify('Customer updated ✓');
      } else {
        const { data: nd, error } = await db.from('customers').insert(toDB.customer(data)).select().single();
        if (error) throw error;
        setCustomers(prev => [fromDB.customer(nd), ...prev]);
        notify('Customer added ✓');
      }
      setShowForm(false); setEditId(null);
    } catch(e) { notify('Save failed: '+e.message, 'error'); }
    finally { setSaving(false); }
  };

  const del = async id => {
    const cnt = orders.filter(o=>o.customerId===id).length;
    if (cnt>0 && !confirm(`This customer has ${cnt} orders. Delete anyway?`)) return;
    const { error } = await db.from('customers').delete().eq('id', id);
    if (error) return notify('Delete failed','error');
    setCustomers(prev => prev.filter(c=>c.id!==id));
    notify('Customer deleted');
  };

  return (
    <div className="px-4 py-5 slide-up">
      <div className="flex items-center justify-between mb-4">
        <h2 className="font-black text-purple-950 text-xl">Clients</h2>
        <Btn onClick={() => { setEditId(null); setShowForm(true); }}>{Ico.plus} Add</Btn>
      </div>
      <div className="relative mb-4">
        <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-purple-400">🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search clients…" className="w-full border-2 border-purple-100 rounded-xl pl-9 pr-4 py-2.5 text-sm bg-white font-medium" />
      </div>
      {filtered.length===0 ? (
        <EmptyState icon="👥" title="No clients yet" sub="Add your first client" action={<Btn onClick={() => setShowForm(true)}>{Ico.plus} Add Client</Btn>} />
      ) : (
        <div className="space-y-3">
          {filtered.map(c => {
            const cnt = orders.filter(o=>o.customerId===c.id).length;
            return (
              <Card key={c.id} className="card-hover">
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-3 flex-1 min-w-0">
                    <div className="w-10 h-10 rounded-2xl muna-gradient flex items-center justify-center text-white font-black text-sm flex-shrink-0">{c.name[0]?.toUpperCase()}</div>
                    <div className="min-w-0">
                      <p className="font-extrabold text-purple-950 truncate">{c.name}</p>
                      <p className="text-xs text-purple-400 font-semibold">{c.phone||'No phone'} · {cnt} order{cnt!==1?'s':''}</p>
                      {c.address && <p className="text-xs text-purple-400 truncate">📍 {c.address}</p>}
                    </div>
                  </div>
                  <div className="flex gap-1 ml-2">
                    <button onClick={() => { setEditId(c.id); setShowForm(true); }} className="p-2 text-purple-300 hover:text-purple-700 rounded-xl hover:bg-purple-50 transition-colors">{Ico.edit}</button>
                    <button onClick={() => del(c.id)} className="p-2 text-purple-300 hover:text-red-500 rounded-xl hover:bg-red-50 transition-colors">{Ico.trash}</button>
                  </div>
                </div>
              </Card>
            );
          })}
        </div>
      )}
      {showForm && (
        <Modal title={editId?'Edit Client':'New Client'} onClose={() => { setShowForm(false); setEditId(null); }}>
          <CustomerForm customer={editId?customers.find(c=>c.id===editId):null} onSave={save} saving={saving} />
        </Modal>
      )}
    </div>
  );
}

function CustomerForm({ customer, onSave, saving }) {
  const [form, setForm] = useState({ name:customer?.name||'', phone:customer?.phone||'', address:customer?.address||'' });
  const f = (k,v) => setForm(p=>({...p,[k]:v}));
  return (
    <div className="space-y-3">
      <Input label="Full Name" required value={form.name} onChange={e=>f('name',e.target.value)} placeholder="e.g. Nilufar Karimova" />
      <Input label="Phone Number" type="tel" value={form.phone} onChange={e=>f('phone',e.target.value)} placeholder="+998 90 123 45 67" />
      <div>
        <label className="block text-xs font-bold text-purple-800 mb-1.5">Address</label>
        <textarea value={form.address} onChange={e=>f('address',e.target.value)} rows={2} className="w-full border-2 border-purple-100 rounded-xl px-3.5 py-2.5 text-sm bg-purple-50/30 resize-none font-medium" placeholder="City, district, street…" />
      </div>
      <Btn size="lg" onClick={() => { if(!form.name.trim()) return alert('Name required.'); onSave(form); }} loading={saving}>{Ico.check} Save Client</Btn>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// EXPENSES
// ═══════════════════════════════════════════════════════════════════════════════
function ExpensesPage({ expenses, setExpenses, salespersons, notify }) {
  const [showForm,    setShowForm]    = useState(false);
  const [editId,      setEditId]      = useState(null);
  const [filterType,  setFilterType]  = useState('All');
  const [saving,      setSaving]      = useState(false);

  const filtered = useMemo(() => {
    const list = filterType==='All' ? expenses : expenses.filter(e=>e.type===filterType);
    return [...list].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  }, [expenses, filterType]);

  const total = filtered.reduce((s,e)=>s+(+e.amountUSD||0), 0);

  const save = async data => {
    setSaving(true);
    try {
      if (editId) {
        const { error } = await db.from('expenses').update(toDB.expense(data)).eq('id', editId);
        if (error) throw error;
        setExpenses(prev => prev.map(e => e.id===editId ? { ...e, ...data } : e));
        notify('Expense updated ✓');
      } else {
        const { data: nd, error } = await db.from('expenses').insert(toDB.expense(data)).select().single();
        if (error) throw error;
        setExpenses(prev => [fromDB.expense(nd), ...prev]);
        notify('Expense added ✓');
      }
      setShowForm(false); setEditId(null);
    } catch(e) { notify('Save failed: '+e.message, 'error'); }
    finally { setSaving(false); }
  };

  const del = async id => {
    if (!confirm('Delete this expense?')) return;
    const { error } = await db.from('expenses').delete().eq('id', id);
    if (error) return notify('Delete failed','error');
    setExpenses(prev => prev.filter(e=>e.id!==id));
    notify('Expense deleted');
  };

  const TYPE_ICONS = { Salary:'👤', Cargo:'🚢', Office:'🏢', Marketing:'📢', Other:'📌' };

  return (
    <div className="px-4 py-5 slide-up">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="font-black text-purple-950 text-xl">Expenses</h2>
          <p className="text-xs text-purple-400 font-semibold">Showing: <span className="font-black text-red-500">{fmtUSD(total)}</span></p>
        </div>
        <Btn onClick={() => { setEditId(null); setShowForm(true); }}>{Ico.plus} Add</Btn>
      </div>
      <div className="flex gap-2 overflow-x-auto pb-2 mb-4 -mx-4 px-4">
        {['All',...EXP_TYPES].map(t => (
          <button key={t} onClick={() => setFilterType(t)}
            className={`flex-shrink-0 px-3.5 py-1.5 rounded-full text-xs font-bold transition-all ${filterType===t?'bg-purple-800 text-white shadow-sm':'bg-white text-purple-500 border-2 border-purple-100 hover:border-purple-300'}`}>{t}</button>
        ))}
      </div>
      {filtered.length===0 ? (
        <EmptyState icon="💰" title="No expenses" sub="Track salary, cargo, and other costs" action={<Btn onClick={() => setShowForm(true)}>{Ico.plus} Add Expense</Btn>} />
      ) : (
        <div className="space-y-2">
          {filtered.map(exp => (
            <Card key={exp.id} className="card-hover">
              <div className="flex items-center gap-3">
                <div className="w-11 h-11 rounded-2xl bg-purple-50 flex items-center justify-center text-2xl flex-shrink-0">{TYPE_ICONS[exp.type]||'📌'}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-0.5">
                    <span className="text-xs bg-purple-50 text-purple-700 px-2 py-0.5 rounded-full font-bold">{exp.type}</span>
                    <span className="text-xs text-purple-400 font-semibold">{fmtDate(exp.date)}</span>
                  </div>
                  <p className="font-extrabold text-purple-950 truncate">{exp.description}</p>
                  <p className="text-xs text-purple-400 font-semibold">Paid by: {exp.paidBy}</p>
                </div>
                <div className="text-right ml-2">
                  <p className="font-black text-red-500">{fmtUSD(exp.amountUSD)}</p>
                  <div className="flex gap-1 justify-end mt-1">
                    <button onClick={() => { setEditId(exp.id); setShowForm(true); }} className="p-1.5 text-purple-300 hover:text-purple-700 transition-colors">{Ico.edit}</button>
                    <button onClick={() => del(exp.id)} className="p-1.5 text-purple-300 hover:text-red-500 transition-colors">{Ico.trash}</button>
                  </div>
                </div>
              </div>
            </Card>
          ))}
        </div>
      )}
      {showForm && (
        <Modal title={editId?'Edit Expense':'New Expense'} onClose={() => { setShowForm(false); setEditId(null); }}>
          <ExpenseForm expense={editId?expenses.find(e=>e.id===editId):null} onSave={save} saving={saving} salespersons={salespersons} />
        </Modal>
      )}
    </div>
  );
}

function ExpenseForm({ expense, onSave, saving, salespersons }) {
  const sp = salespersons?.length ? salespersons : [];
  const [form, setForm] = useState({ date:expense?.date||today(), type:expense?.type||'Salary', description:expense?.description||'', amountUSD:expense?.amountUSD||'', paidBy:expense?.paidBy||sp[0]||'' });
  const f = (k,v) => setForm(p=>({...p,[k]:v}));
  return (
    <div className="space-y-3">
      <div className="grid grid-cols-2 gap-3">
        <Input label="Date" required type="date" value={form.date} onChange={e=>f('date',e.target.value)} />
        <Sel label="Type" required value={form.type} onChange={e=>f('type',e.target.value)}>{EXP_TYPES.map(t=><option key={t}>{t}</option>)}</Sel>
      </div>
      <Input label="Description" required value={form.description} onChange={e=>f('description',e.target.value)} placeholder="e.g. Monthly cargo payment" />
      <Input label="Amount (USD)" required type="number" min="0" step="0.01" value={form.amountUSD} onChange={e=>f('amountUSD',e.target.value)} placeholder="0.00" />
      <div>
        <label className="block text-xs font-bold text-purple-800 mb-1.5">Paid By</label>
        <input list="sp-opts" value={form.paidBy} onChange={e=>f('paidBy',e.target.value)} className="w-full border-2 border-purple-100 rounded-xl px-3.5 py-2.5 text-sm bg-purple-50/30 font-medium" placeholder="Name" />
        <datalist id="sp-opts">{sp.map(s=><option key={s} value={s}/>)}</datalist>
      </div>
      <Btn size="lg" onClick={() => { if(!form.description.trim()||!form.amountUSD) return alert('Fill required fields.'); onSave(form); }} loading={saving}>{Ico.check} Save Expense</Btn>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════════════════════════
function SettingsPage({ settings, setSettings, notify }) {
  const [krwToUsd, setKrwToUsd] = useState(settings.krwToUsd);
  const [spList,   setSpList]   = useState((settings.salespersons||[]).join(', '));

  const save = () => {
    setSettings({ ...settings, krwToUsd: +krwToUsd, salespersons: spList.split(',').map(s=>s.trim()).filter(Boolean) });
    notify('Settings saved ✓');
  };

  return (
    <div className="px-4 py-5 slide-up space-y-4">
      <h2 className="font-black text-purple-950 text-xl">Settings</h2>
      <Card>
        <p className="font-extrabold text-purple-900 mb-3">Exchange Rate</p>
        <div className="space-y-2">
          <Input label="KRW → USD Rate" type="number" step="0.000001" value={krwToUsd} onChange={e=>setKrwToUsd(e.target.value)} />
          <p className="text-xs text-purple-400 font-semibold">₩1,000 = ${(1000*(+krwToUsd||0)).toFixed(2)} · Update from Google "KRW to USD"</p>
        </div>
      </Card>
      <Card>
        <p className="font-extrabold text-purple-900 mb-3">Team Members</p>
        <div>
          <label className="block text-xs font-bold text-purple-800 mb-1.5">Salespersons (comma-separated)</label>
          <textarea value={spList} onChange={e=>setSpList(e.target.value)} rows={2} className="w-full border-2 border-purple-100 rounded-xl px-3.5 py-2.5 text-sm bg-purple-50/30 resize-none font-medium" placeholder="Amir, Zara, Dina…" />
        </div>
      </Card>
      <Btn size="lg" onClick={save}>{Ico.check} Save Settings</Btn>
      <Card>
        <div className="flex items-center gap-3 mb-2">
          <MunaLogo size={40} />
          <div>
            <p className="font-black text-purple-950">Muna Manager</p>
            <p className="text-xs text-purple-400 font-semibold">v2.0 · Supabase Edition</p>
          </div>
        </div>
        <p className="text-xs text-purple-400">Data stored securely in your Supabase database.</p>
      </Card>
    </div>
  );
}
