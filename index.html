<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Muna Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:#fdf2f8;color:#1f2937}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-thumb{background:#f9a8d4;border-radius:4px}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#ec4899!important;box-shadow:0 0 0 2px rgba(236,72,153,.15)}
    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl th{background:#fff9fb;color:#9ca3af;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;text-align:left;border-bottom:1px solid #fce7f3;white-space:nowrap;position:sticky;top:0;z-index:1}
    .tbl td{padding:9px 12px;border-bottom:1px solid #fce7f3;vertical-align:middle}
    .tbl tr:hover td{background:#fff5f8}
    .tbl tr:last-child td{border-bottom:none}
    .status-sel{border:none;background:transparent;font-size:11px;font-weight:800;cursor:pointer;outline:none;padding:0 2px;border-radius:4px;font-family:'Nunito',sans-serif}
    .slide-up{animation:slideUp .2s ease-out}
    @keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
    .fade-in{animation:fadeIn .15s ease-out}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const SUPABASE_URL = 'https://tyggjybpadgifadakaof.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1n7GfREMkbbDMrpfGd-TRA_tVCAvgZ7';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ORDER_STATUSES = ['Pending','Purchased','Shipped','Delivered','Posted'];
const CATEGORIES = ['Toner','Serum','Moisturizer','Sunscreen','Cleanser','Mask','Eye Care','Lip','Body','Hair','Other'];
const SKIN_TYPES = ['All','All Skin Types','Dry','Oily','Oily/Combo','Combination','Sensitive','Normal','Normal/Dry'];
const EXP_TYPES  = ['Salary','Cargo','Packaging','Postal','Marketing','Other'];

const STATUS_STYLE = {
  Pending:   {bg:'bg-amber-100',  text:'text-amber-800',  dot:'bg-amber-400'},
  Purchased: {bg:'bg-blue-100',   text:'text-blue-800',   dot:'bg-blue-400'},
  Shipped:   {bg:'bg-violet-100', text:'text-violet-800', dot:'bg-violet-400'},
  Delivered: {bg:'bg-green-100',  text:'text-green-600',  dot:'bg-green-500'},
  Posted:    {bg:'bg-pink-100',   text:'text-pink-700',   dot:'bg-pink-500'},
};

const today   = () => new Date().toISOString().slice(0,10);
const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const fmtKRW  = n => `₩${Math.round(+n||0).toLocaleString()}`;
const fmtUZS  = n => `${Math.round(+n||0).toLocaleString()} UZS`;
const fmtNum  = n => (+n||0).toLocaleString();
const lsGet   = (k,d) => { try{const v=localStorage.getItem('muna_'+k);return v?JSON.parse(v):d}catch{return d} };
const lsSet   = (k,v) => { try{localStorage.setItem('muna_'+k,JSON.stringify(v))}catch{} };

// DB mappers
const fromDB = {
  catalog:  r => ({id:r.id,brand:r.brand,name:r.name,category:r.category||'',skinType:r.skin_type||'All',weightGrams:+r.weight_grams||0,estimatedCostKRW:+r.estimated_cost_krw||0,suggestedB2CPrice:+r.suggested_b2c_price_uzs||0,suggestedB2BPrice:+r.suggested_b2b_price_uzs||0,notes:r.notes||'',createdAt:r.created_at?.slice(0,10)}),
  customer: r => ({id:r.id,name:r.name,telegram:r.telegram||'',phone:r.phone||'',address:r.address||'',createdAt:r.created_at?.slice(0,10)}),
  order:    r => ({id:r.id,customerId:r.customer_id,status:r.status||'Pending',paymentStatus:r.payment_status||'Unpaid',salesperson:r.salesperson||'',notes:r.notes||'',createdAt:r.created_at?.slice(0,10)}),
  orderItem:r => ({id:r.id,orderId:r.order_id,productId:r.product_id,quantity:+r.quantity||1,priceUZS:+r.price_uzs||0,type:r.type||'B2C'}),
  expense:  r => ({id:r.id,date:r.date,type:r.type,description:r.description,amountKRW:+r.amount_krw||0,paidBy:r.paid_by||''}),
  transfer: r => ({id:r.id,date:r.date,amountKRW:+r.amount_krw||0,amountUZS:+r.amount_uzs||0,notes:r.notes||''}),
  capital:  r => ({id:r.id,date:r.date,amountUZS:+r.amount_uzs||0,person:r.person||'',notes:r.notes||''}),
};
const toDB = {
  catalog:  p => ({brand:p.brand,name:p.name,category:p.category||null,skin_type:p.skinType||'All',weight_grams:+p.weightGrams||0,estimated_cost_krw:+p.estimatedCostKRW||0,suggested_b2c_price_uzs:+p.suggestedB2CPrice||0,suggested_b2b_price_uzs:+p.suggestedB2BPrice||0,notes:p.notes||null}),
  customer: c => ({name:c.name,telegram:c.telegram||null,phone:c.phone||null,address:c.address||null}),
  order:    o => ({customer_id:o.customerId||null,status:o.status||'Pending',payment_status:o.paymentStatus||'Unpaid',salesperson:o.salesperson||null,notes:o.notes||null}),
  orderItem:i => ({order_id:i.orderId,product_id:i.productId||null,quantity:+i.quantity||1,price_uzs:+i.priceUZS||0,type:i.type||'B2C'}),
  expense:  e => ({date:e.date,type:e.type,description:e.description,amount_krw:+e.amountKRW||0,paid_by:e.paidBy||null}),
  transfer: t => ({date:t.date,amount_krw:+t.amountKRW||0,amount_uzs:+t.amountUZS||0,notes:t.notes||null}),
  capital:  c => ({date:c.date,amount_uzs:+c.amountUZS||0,person:c.person||null,notes:c.notes||null}),
};

// ── UI ATOMS ──────────────────────────────────────────────────
function Toast({msg,type}) {
  if(!msg) return null;
  const bg=type==='error'?'bg-red-500':type==='info'?'bg-blue-500':'bg-green-500';
  return <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[999] px-5 py-2.5 rounded-2xl text-white text-sm font-bold shadow-xl fade-in ${bg}`}>{msg}</div>;
}

const Btn=({children,onClick,variant='primary',size='md',className='',type='button',disabled=false,loading=false})=>{
  const base='inline-flex items-center justify-center gap-1.5 font-bold rounded-xl transition-all active:scale-95 disabled:opacity-50 whitespace-nowrap';
  const sz={xs:'px-2.5 py-1 text-xs',sm:'px-3 py-1.5 text-xs',md:'px-3.5 py-2 text-sm',lg:'px-4 py-2.5 text-sm w-full'};
  const va={primary:'bg-pink-500 hover:bg-pink-600 text-white shadow-sm',secondary:'bg-pink-50 hover:bg-pink-100 text-pink-700',danger:'bg-red-50 hover:bg-red-100 text-red-600',ghost:'hover:bg-gray-100 text-gray-500',outline:'border border-pink-200 text-pink-600 hover:bg-pink-50'};
  return <button type={type} onClick={onClick} disabled={disabled||loading} className={`${base} ${sz[size]} ${va[variant]} ${className}`}>{loading?<span className="w-3.5 h-3.5 border-2 border-current border-t-transparent rounded-full animate-spin"/>:children}</button>;
};

const Inp=({label,required,className='',...props})=>(
  <div className={className}>
    {label&&<label className="block text-xs font-bold text-gray-500 mb-1">{label}{required&&<span className="text-pink-500 ml-0.5">*</span>}</label>}
    <input className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50" {...props}/>
  </div>
);

const Sel=({label,required,children,className='',...props})=>(
  <div className={className}>
    {label&&<label className="block text-xs font-bold text-gray-500 mb-1">{label}{required&&<span className="text-pink-500 ml-0.5">*</span>}</label>}
    <select className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 appearance-none" {...props}>{children}</select>
  </div>
);

const Modal=({title,onClose,children,wide=false})=>(
  <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center fade-in" style={{background:'rgba(0,0,0,0.4)'}}>
    <div className={`bg-white w-full ${wide?'max-w-2xl':'max-w-lg'} rounded-t-3xl sm:rounded-2xl shadow-2xl max-h-[92vh] flex flex-col slide-up`}>
      <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100 flex-shrink-0">
        <h3 className="font-extrabold text-gray-800">{title}</h3>
        <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 font-black text-lg">×</button>
      </div>
      <div className="overflow-y-auto flex-1 px-5 py-4">{children}</div>
    </div>
  </div>
);

const StatusBadge=({status,onChange})=>{
  const s=STATUS_STYLE[status]||STATUS_STYLE.Pending;
  return(
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-black ${s.bg} ${s.text}`}>
      <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${s.dot}`}/>
      {onChange
        ?<select value={status} onChange={e=>{e.stopPropagation();onChange(e.target.value)}} onClick={e=>e.stopPropagation()} className={`status-sel ${s.bg} ${s.text}`}>
            {ORDER_STATUSES.map(x=><option key={x}>{x}</option>)}
          </select>
        :status}
    </span>
  );
};

const PayBadge=({status,onChange})=>{
  const paid=status==='Paid';
  return(
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-black cursor-pointer ${paid?'bg-emerald-100 text-emerald-700':'bg-red-100 text-red-600'}`}
      onClick={()=>onChange&&onChange(paid?'Unpaid':'Paid')}>
      {paid?'✓ Paid':'⏳ Unpaid'}
    </span>
  );
};

const StatBox=({label,value,sub,color='pink'})=>{
  const gr={pink:'from-pink-500 to-rose-500',violet:'from-violet-500 to-purple-600',green:'from-emerald-500 to-green-600',amber:'from-amber-400 to-orange-500',blue:'from-blue-500 to-indigo-500',gray:'from-gray-400 to-gray-600'};
  return(
    <div className={`bg-gradient-to-br ${gr[color]} rounded-2xl p-4 text-white shadow-sm`}>
      <p className="text-xs font-semibold opacity-70 mb-0.5">{label}</p>
      <p className="text-lg font-black leading-tight">{value}</p>
      {sub&&<p className="text-xs opacity-60 mt-0.5">{sub}</p>}
    </div>
  );
};

const Card=({children,className=''})=><div className={`bg-white rounded-2xl border border-pink-50 shadow-sm ${className}`}>{children}</div>;
const TblWrap=({children})=>(
  <div className="bg-white rounded-2xl border border-pink-50 shadow-sm overflow-hidden">
    <div className="overflow-x-auto"><table className="tbl">{children}</table></div>
  </div>
);
const Empty=({icon,title,sub,action})=>(
  <div className="flex flex-col items-center justify-center py-16 text-center">
    <div className="text-4xl mb-3">{icon}</div>
    <p className="font-bold text-gray-600 mb-1">{title}</p>
    <p className="text-sm text-gray-400 mb-4">{sub}</p>
    {action}
  </div>
);
const Spinner=()=>(
  <div className="flex items-center justify-center h-40">
    <div className="w-8 h-8 border-4 border-pink-200 border-t-pink-500 rounded-full animate-spin"/>
  </div>
);

// ── PAGES CONFIG ─────────────────────────────────────────────
const PAGES=[
  {key:'dashboard', label:'Dashboard', icon:'▦'},
  {key:'orders',    label:'Orders',    icon:'≡'},
  {key:'customers', label:'Customers', icon:'♟'},
  {key:'catalog',   label:'Catalog',   icon:'⊞'},
  {key:'procurement',label:'Buy List', icon:'🛒'},
  {key:'finance',   label:'Finance',   icon:'₩'},
  {key:'settings',  label:'Settings',  icon:'⚙'},
];

// ── APP ───────────────────────────────────────────────────────
function App() {
  const [page,       setPage]       = useState('dashboard');
  const [catalog,    setCatalog]    = useState([]);
  const [customers,  setCustomers]  = useState([]);
  const [orders,     setOrders]     = useState([]);
  const [orderItems, setOrderItems] = useState([]);
  const [expenses,   setExpenses]   = useState([]);
  const [transfers,  setTransfers]  = useState([]);
  const [capital,    setCapital]    = useState([]);
  const [settings,   setSettings]   = useState(()=>lsGet('settings',{shippingRateKRW:15000,uzsPerKrw:8,salespersons:['Nazokat','Namuna','Oybek','OJ']}));
  const [loading,    setLoading]    = useState(true);
  const [toast,      setToast]      = useState({msg:'',type:'success'});
  const toastRef = useRef(null);

  const notify=(msg,type='success')=>{
    clearTimeout(toastRef.current);
    setToast({msg,type});
    toastRef.current=setTimeout(()=>setToast({msg:'',type:'success'}),2800);
  };

  useEffect(()=>{
    (async()=>{
      try{
        const [ca,cu,or,oi,ex,tr,cp]=await Promise.all([
          db.from('catalog').select('*').order('brand'),
          db.from('customers').select('*').order('name'),
          db.from('orders').select('*').order('created_at',{ascending:false}),
          db.from('order_items').select('*'),
          db.from('expenses').select('*').order('date',{ascending:false}),
          db.from('transfers').select('*').order('date',{ascending:false}),
          db.from('capital').select('*').order('date',{ascending:false}),
        ]);
        if(ca.error||cu.error||or.error||oi.error) throw new Error('Load failed');
        setCatalog(ca.data.map(fromDB.catalog));
        setCustomers(cu.data.map(fromDB.customer));
        setOrders(or.data.map(fromDB.order));
        setOrderItems(oi.data.map(fromDB.orderItem));
        setExpenses((ex.data||[]).map(fromDB.expense));
        setTransfers((tr.data||[]).map(fromDB.transfer));
        setCapital((cp.data||[]).map(fromDB.capital));
      }catch(err){
        notify('Could not connect to database.','error');
      }finally{setLoading(false);}
    })();
  },[]);

  useEffect(()=>{lsSet('settings',settings);},[settings]);

  const ctx={catalog,setCatalog,customers,setCustomers,orders,setOrders,orderItems,setOrderItems,expenses,setExpenses,transfers,setTransfers,capital,setCapital,settings,setSettings,notify};

  if(loading) return(
    <div className="min-h-screen flex flex-col items-center justify-center gap-4" style={{background:'#fdf2f8'}}>
      <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center text-white font-black text-2xl shadow-lg">M</div>
      <div className="w-8 h-8 border-4 border-pink-200 border-t-pink-500 rounded-full animate-spin"/>
      <p className="text-sm text-gray-400 font-semibold">Loading Muna Manager…</p>
    </div>
  );

  return(
    <div className="min-h-screen" style={{background:'#fdf2f8'}}>
      <Toast msg={toast.msg} type={toast.type}/>
      <header className="bg-white border-b border-pink-100 sticky top-0 z-30 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 h-12 flex items-center gap-3">
          <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center text-white font-black text-xs shadow-sm flex-shrink-0">M</div>
          <span className="font-black text-gray-800 text-sm hidden sm:block">Muna Manager</span>
          <nav className="flex gap-0.5 ml-2 overflow-x-auto">
            {PAGES.map(p=>(
              <button key={p.key} onClick={()=>setPage(p.key)}
                className={`px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap transition-all ${page===p.key?'bg-pink-500 text-white':'text-gray-500 hover:bg-pink-50 hover:text-pink-600'}`}>
                {p.label}
              </button>
            ))}
          </nav>
        </div>
      </header>
      <main className="max-w-7xl mx-auto px-4 py-4 pb-8">
        {page==='dashboard'   && <DashboardPage   {...ctx}/>}
        {page==='orders'      && <OrdersPage       {...ctx}/>}
        {page==='customers'   && <CustomersPage    {...ctx}/>}
        {page==='catalog'     && <CatalogPage      {...ctx}/>}
        {page==='procurement' && <ProcurementPage  {...ctx}/>}
        {page==='finance'     && <FinancePage      {...ctx}/>}
        {page==='settings'    && <SettingsPage     {...ctx}/>}
      </main>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────
function DashboardPage({orders,orderItems,customers,catalog,expenses,transfers,capital,settings}) {
  const rate=+settings.uzsPerKrw||8;
  const stats=useMemo(()=>{
    const paidOrders=orders.filter(o=>o.paymentStatus==='Paid');
    const paidOrderIds=new Set(paidOrders.map(o=>o.id));
    const revenueUZS=orderItems.filter(i=>paidOrderIds.has(i.orderId)).reduce((s,i)=>s+(+i.priceUZS||0)*(+i.quantity||1),0);
    const totalExpKRW=expenses.reduce((s,e)=>s+(+e.amountKRW||0),0);
    const totalTransKRW=transfers.reduce((s,t)=>s+(+t.amountKRW||0),0);
    const totalCapUZS=capital.reduce((s,c)=>s+(+c.amountUZS||0),0);
    const costUZS=(totalExpKRW+totalTransKRW)*rate;
    const profit=revenueUZS-costUZS;
    const byStatus=Object.fromEntries(ORDER_STATUSES.map(s=>[s,orders.filter(o=>o.status===s).length]));
    const unpaidCount=orders.filter(o=>o.paymentStatus==='Unpaid'&&o.status!=='Posted').length;
    // Top products
    const qty={};
    orderItems.forEach(i=>{if(i.productId)qty[i.productId]=(qty[i.productId]||0)+(+i.quantity||1);});
    const topProducts=Object.entries(qty).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,q])=>{
      const p=catalog.find(c=>c.id===id);
      return{name:p?`${p.brand} ${p.name}`:'Unknown',qty:q};
    });
    return{revenueUZS,profit,totalExpKRW,totalCapUZS,byStatus,unpaidCount,topProducts};
  },[orders,orderItems,expenses,transfers,capital,catalog,rate]);

  const total=orders.length||1;
  return(
    <div className="space-y-5 slide-up">
      <h2 className="font-black text-gray-800 text-xl">Dashboard</h2>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatBox label="Total Orders"    value={fmtNum(orders.length)}        sub="All time"           color="pink"/>
        <StatBox label="Revenue (Paid)"  value={fmtUZS(stats.revenueUZS)}    sub="Paid orders"        color="green"/>
        <StatBox label="Est. Profit"     value={fmtUZS(stats.profit)}         sub="Revenue − costs"    color={stats.profit>=0?'violet':'amber'}/>
        <StatBox label="Unpaid Orders"   value={stats.unpaidCount}            sub="Need collection"    color={stats.unpaidCount>0?'amber':'gray'}/>
      </div>

      {/* Pipeline */}
      <Card className="p-4">
        <h3 className="font-extrabold text-gray-700 mb-3">Order Pipeline</h3>
        <div className="flex gap-2 border-radius overflow-hidden h-2 rounded-full mb-3 bg-gray-100">
          {ORDER_STATUSES.map(s=>{
            const cnt=stats.byStatus[s]||0;
            const pct=Math.max(0,(cnt/total)*100);
            const col={Pending:'#fbbf24',Purchased:'#60a5fa',Shipped:'#a78bfa',Delivered:'#34d399',Posted:'#f472b6'};
            return pct>0?<div key={s} style={{width:`${pct}%`,background:col[s]}} title={`${s}: ${cnt}`} className="h-2"/>:null;
          })}
        </div>
        <div className="grid grid-cols-5 gap-2 text-center">
          {ORDER_STATUSES.map(s=>{
            const cnt=stats.byStatus[s]||0;
            const st=STATUS_STYLE[s];
            return(
              <div key={s} className={`${st.bg} rounded-xl p-2`}>
                <p className={`text-xl font-black ${st.text}`}>{cnt}</p>
                <p className={`text-xs font-bold ${st.text} opacity-70`}>{s}</p>
              </div>
            );
          })}
        </div>
      </Card>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <Card className="p-4">
          <h3 className="font-extrabold text-gray-700 mb-3">Top Products</h3>
          {stats.topProducts.length===0?<p className="text-sm text-gray-400">No orders yet</p>
            :<div className="space-y-2">
              {stats.topProducts.map((p,i)=>(
                <div key={i} className="flex items-center justify-between">
                  <div className="flex items-center gap-2 min-w-0">
                    <span className="w-5 h-5 rounded-lg bg-pink-100 text-pink-600 text-xs font-black flex items-center justify-center flex-shrink-0">{i+1}</span>
                    <span className="text-sm font-semibold text-gray-700 truncate">{p.name}</span>
                  </div>
                  <span className="text-sm font-black text-gray-800 ml-2 flex-shrink-0">{p.qty} pcs</span>
                </div>
              ))}
            </div>
          }
        </Card>
        <Card className="p-4">
          <h3 className="font-extrabold text-gray-700 mb-3">Recent Orders</h3>
          {orders.length===0?<p className="text-sm text-gray-400">No orders yet</p>
            :<div className="space-y-2">
              {orders.slice(0,6).map(o=>{
                const c=customers.find(x=>x.id===o.customerId);
                const items=orderItems.filter(i=>i.orderId===o.id);
                const total=items.reduce((s,i)=>s+(+i.priceUZS||0)*(+i.quantity||1),0);
                return(
                  <div key={o.id} className="flex items-center justify-between gap-2">
                    <div className="min-w-0 flex-1">
                      <p className="text-xs font-bold text-gray-800 truncate">{c?.name||'—'}</p>
                      <p className="text-xs text-gray-400">{items.length} item{items.length!==1?'s':''}</p>
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                      <StatusBadge status={o.status}/>
                      <PayBadge status={o.paymentStatus}/>
                      <span className="text-xs font-bold text-gray-700">{fmtUZS(total)}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          }
        </Card>
      </div>
    </div>
  );
}

// ── ORDERS PAGE ───────────────────────────────────────────────
function OrdersPage({orders,setOrders,orderItems,setOrderItems,customers,catalog,settings,notify}) {
  const [statusFilter,setStatusFilter]=useState('All');
  const [payFilter,   setPayFilter]   =useState('All');
  const [search,      setSearch]      =useState('');
  const [showForm,    setShowForm]    =useState(false);
  const [editOrder,   setEditOrder]   =useState(null);
  const [saving,      setSaving]      =useState(false);

  const filtered=useMemo(()=>{
    let list=statusFilter==='All'?orders:orders.filter(o=>o.status===statusFilter);
    if(payFilter!=='All') list=list.filter(o=>o.paymentStatus===payFilter);
    if(search.trim()){
      const q=search.toLowerCase();
      list=list.filter(o=>{
        const c=customers.find(x=>x.id===o.customerId);
        return c?.name.toLowerCase().includes(q)||c?.phone?.includes(q)||c?.telegram?.toLowerCase().includes(q);
      });
    }
    return list;
  },[orders,statusFilter,payFilter,search,customers]);

  const updateStatus=async(orderId,newStatus)=>{
    const{error}=await db.from('orders').update({status:newStatus}).eq('id',orderId);
    if(error) return notify('Update failed','error');
    setOrders(prev=>prev.map(o=>o.id===orderId?{...o,status:newStatus}:o));
    notify(`Status → ${newStatus}`);
  };

  const updatePayment=async(orderId,newPay)=>{
    const{error}=await db.from('orders').update({payment_status:newPay}).eq('id',orderId);
    if(error) return notify('Update failed','error');
    setOrders(prev=>prev.map(o=>o.id===orderId?{...o,paymentStatus:newPay}:o));
    notify(newPay==='Paid'?'Payment received ✓':'Marked unpaid');
  };

  const saveOrder=async(orderData,items)=>{
    setSaving(true);
    try{
      // Auto-create new customer if only a name was typed
      if(!orderData.customerId&&orderData.newCustomerName){
        const{data:nc,error:ce}=await db.from('customers').insert({name:orderData.newCustomerName}).select().single();
        if(ce) throw ce;
        setCustomers(prev=>[...prev,fromDB.customer(nc)].sort((a,b)=>a.name.localeCompare(b.name)));
        orderData={...orderData,customerId:nc.id};
        notify(`New customer "${nc.name}" created`);
      }
      if(editOrder){
        const{error}=await db.from('orders').update(toDB.order(orderData)).eq('id',editOrder.id);
        if(error) throw error;
        // Replace items
        await db.from('order_items').delete().eq('order_id',editOrder.id);
        const newItems=items.map(i=>({...toDB.orderItem(i),order_id:editOrder.id}));
        const{data:nd,error:ie}=await db.from('order_items').insert(newItems).select();
        if(ie) throw ie;
        setOrders(prev=>prev.map(o=>o.id===editOrder.id?{...o,...orderData}:o));
        setOrderItems(prev=>[...prev.filter(i=>i.orderId!==editOrder.id),...nd.map(fromDB.orderItem)]);
        notify('Order updated ✓');
      } else {
        const{data:od,error:oe}=await db.from('orders').insert(toDB.order(orderData)).select().single();
        if(oe) throw oe;
        const newItems=items.map(i=>({...toDB.orderItem(i),order_id:od.id}));
        const{data:id,error:ie}=await db.from('order_items').insert(newItems).select();
        if(ie) throw ie;
        setOrders(prev=>[fromDB.order(od),...prev]);
        setOrderItems(prev=>[...prev,...id.map(fromDB.orderItem)]);
        notify('Order created ✓');
      }
      setShowForm(false); setEditOrder(null);
    }catch(e){notify('Save failed: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const deleteOrder=async(id)=>{
    if(!confirm('Delete this order?')) return;
    await db.from('order_items').delete().eq('order_id',id);
    const{error}=await db.from('orders').delete().eq('id',id);
    if(error) return notify('Delete failed','error');
    setOrders(prev=>prev.filter(o=>o.id!==id));
    setOrderItems(prev=>prev.filter(i=>i.orderId!==id));
    notify('Order deleted');
  };

  return(
    <div className="space-y-4 slide-up">
      <div className="flex flex-wrap items-center gap-2">
        <h2 className="font-black text-gray-800 text-xl flex-1">Orders</h2>
        <Btn size="sm" onClick={()=>{setEditOrder(null);setShowForm(true);}}>+ New Order</Btn>
      </div>

      {/* Filters */}
      <div className="flex flex-wrap gap-2">
        <div className="flex gap-1 overflow-x-auto">
          {['All',...ORDER_STATUSES].map(s=>{
            const cnt=s==='All'?orders.length:orders.filter(o=>o.status===s).length;
            return(
              <button key={s} onClick={()=>setStatusFilter(s)}
                className={`flex-shrink-0 px-3 py-1 rounded-full text-xs font-bold transition-all ${statusFilter===s?'bg-pink-500 text-white':'bg-white text-gray-500 border border-gray-200 hover:border-pink-300'}`}>
                {s} ({cnt})
              </button>
            );
          })}
        </div>
        <div className="flex gap-1">
          {['All','Unpaid','Paid'].map(p=>(
            <button key={p} onClick={()=>setPayFilter(p)}
              className={`px-3 py-1 rounded-full text-xs font-bold transition-all ${payFilter===p?'bg-emerald-500 text-white':'bg-white text-gray-500 border border-gray-200'}`}>
              {p}
            </button>
          ))}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search customer…"
          className="border border-gray-200 rounded-xl px-3 py-1.5 text-sm bg-white ml-auto w-48"/>
      </div>

      {filtered.length===0
        ?<Empty icon="📋" title="No orders found" sub="Create your first order" action={<Btn onClick={()=>setShowForm(true)}>+ New Order</Btn>}/>
        :<TblWrap>
          <thead><tr>
            <th>Date</th><th>Customer</th><th>Items</th><th>Total (UZS)</th><th>Status</th><th>Payment</th><th>Sales</th><th></th>
          </tr></thead>
          <tbody>
            {filtered.map(o=>{
              const c=customers.find(x=>x.id===o.customerId);
              const items=orderItems.filter(i=>i.orderId===o.id);
              const total=items.reduce((s,i)=>s+(+i.priceUZS||0)*(+i.quantity||1),0);
              return(
                <tr key={o.id}>
                  <td className="text-gray-400 text-xs whitespace-nowrap">{fmtDate(o.createdAt)}</td>
                  <td>
                    <p className="font-bold text-gray-800 text-sm">{c?.name||'—'}</p>
                    <p className="text-xs text-gray-400">{c?.phone||c?.telegram||''}</p>
                  </td>
                  <td>
                    <div className="space-y-0.5">
                      {items.slice(0,2).map(i=>{
                        const p=catalog.find(x=>x.id===i.productId);
                        return<p key={i.id} className="text-xs text-gray-600 truncate max-w-[180px]">{i.quantity}× {p?p.name:'Unknown'}</p>;
                      })}
                      {items.length>2&&<p className="text-xs text-gray-400">+{items.length-2} more</p>}
                    </div>
                  </td>
                  <td className="font-black text-gray-800">{fmtUZS(total)}</td>
                  <td><StatusBadge status={o.status} onChange={ns=>updateStatus(o.id,ns)}/></td>
                  <td><PayBadge status={o.paymentStatus} onChange={np=>updatePayment(o.id,np)}/></td>
                  <td className="text-gray-500 text-xs">{o.salesperson||'—'}</td>
                  <td>
                    <div className="flex gap-1">
                      <Btn size="xs" variant="ghost" onClick={()=>{setEditOrder(o);setShowForm(true);}}>✎</Btn>
                      <Btn size="xs" variant="danger" onClick={()=>deleteOrder(o.id)}>✕</Btn>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </TblWrap>
      }

      {showForm&&(
        <OrderForm
          order={editOrder}
          orderItems={editOrder?orderItems.filter(i=>i.orderId===editOrder.id):[]}
          customers={customers}
          catalog={catalog}
          settings={settings}
          salespersons={settings.salespersons||[]}
          onSave={saveOrder}
          saving={saving}
          onClose={()=>{setShowForm(false);setEditOrder(null);}}
        />
      )}
    </div>
  );
}

function OrderForm({order,orderItems,customers,catalog,settings,salespersons,onSave,onClose,saving}) {
  const sp=salespersons?.length?salespersons:['—'];
  const [form,setForm]=useState({
    customerId: order?.customerId||'',
    status:     order?.status||'Pending',
    paymentStatus: order?.paymentStatus||'Unpaid',
    salesperson:order?.salesperson||sp[0]||'',
    notes:      order?.notes||'',
  });
  const [items,setItems]=useState(orderItems?.length?orderItems.map(i=>({...i,discountPct:0})):[{productId:'',quantity:1,priceUZS:'',discountPct:0,type:'B2C'}]);
  const [prodSearch,setProdSearch]=useState('');
  const [activeItemIdx,setActiveItemIdx]=useState(null);
  const [custSearch,setCustSearch]=useState('');
  const [custOpen,setCustOpen]=useState(false);
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const addItem=()=>setItems(p=>[...p,{productId:'',quantity:1,priceUZS:'',discountPct:0,type:'B2C'}]);
  const removeItem=idx=>setItems(p=>p.filter((_,i)=>i!==idx));
  const updateItem=(idx,k,v)=>setItems(p=>p.map((it,i)=>{
    if(i!==idx) return it;
    const updated={...it,[k]:v};
    if(k==='productId'||k==='type'){
      const prod=catalog.find(c=>c.id===(k==='productId'?v:it.productId));
      if(prod) updated.priceUZS=(k==='type'?v:updated.type)==='B2B'?prod.suggestedB2BPrice:prod.suggestedB2CPrice;
    }
    return updated;
  }));

  const filteredCatalog=useMemo(()=>{
    if(!prodSearch.trim()) return catalog.slice(0,20);
    const q=prodSearch.toLowerCase();
    return catalog.filter(p=>(`${p.brand} ${p.name}`).toLowerCase().includes(q)).slice(0,15);
  },[catalog,prodSearch]);

  const filteredCustomers=useMemo(()=>{
    if(!custSearch.trim()) return customers.slice(0,8);
    const q=custSearch.toLowerCase();
    return customers.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.phone||'').includes(q)||(c.telegram||'').toLowerCase().includes(q)).slice(0,8);
  },[customers,custSearch]);

  const orderTotal=items.reduce((s,i)=>{
    const unit=+i.priceUZS||0;
    const disc=Math.min(100,Math.max(0,+i.discountPct||0));
    return s+Math.round(unit*(1-disc/100))*(+i.quantity||1);
  },0);

  const submit=()=>{
    const hasCustomer=form.customerId||custSearch.trim();
    if(!hasCustomer) return alert('Please enter a customer name.');
    if(items.every(i=>!i.productId&&!i.priceUZS)) return alert('Add at least one item.');
    const validItems=items.filter(i=>i.productId||i.priceUZS).map(i=>{
      const unit=+i.priceUZS||0;
      const disc=+i.discountPct||0;
      return {...i,priceUZS:Math.round(unit*(1-disc/100))};
    });
    const orderData={...form};
    if(!form.customerId&&custSearch.trim()) orderData.newCustomerName=custSearch.trim();
    onSave(orderData,validItems);
  };

  const selectedCustomer=customers.find(c=>c.id===form.customerId);

  return(
    <Modal title={order?'Edit Order':'New Order'} onClose={onClose} wide>
      <div className="space-y-4">
        {/* Customer */}
        <div>
          <label className="block text-xs font-bold text-gray-500 mb-1">Customer <span className="text-pink-500">*</span></label>
          {selectedCustomer
            ?<div className="flex items-center gap-2 border border-pink-200 rounded-xl px-3 py-2 bg-pink-50">
               <div className="flex-1">
                 <p className="text-sm font-bold text-gray-800">{selectedCustomer.name}</p>
                 <p className="text-xs text-gray-400">{selectedCustomer.phone||selectedCustomer.telegram||''}{selectedCustomer.address?' · '+selectedCustomer.address:''}</p>
               </div>
               <button onClick={()=>{f('customerId','');setCustSearch('');}} className="text-gray-400 hover:text-red-500 font-black text-lg">×</button>
             </div>
            :<div className="relative">
               <input
                 value={custSearch}
                 onChange={e=>{setCustSearch(e.target.value);setCustOpen(true);f('customerId','');}}
                 onFocus={()=>setCustOpen(true)}
                 onBlur={()=>setTimeout(()=>setCustOpen(false),180)}
                 placeholder="Type customer name…"
                 className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:border-pink-400 focus:outline-none"
               />
               {custOpen&&(
                 <div className="absolute top-full left-0 right-0 border border-gray-200 rounded-xl bg-white shadow-lg max-h-52 overflow-y-auto mt-1 z-20">
                   {filteredCustomers.map(c=>(
                     <button key={c.id} onMouseDown={()=>{f('customerId',c.id);setCustSearch('');setCustOpen(false);}}
                       className="w-full text-left px-3 py-2 hover:bg-pink-50 text-sm border-b border-gray-100 last:border-0">
                       <span className="font-bold text-gray-800">{c.name}</span>
                       {(c.phone||c.telegram)&&<span className="text-xs text-gray-400 ml-2">{c.phone||c.telegram}</span>}
                     </button>
                   ))}
                   {custSearch.trim()&&!filteredCustomers.find(c=>c.name.toLowerCase()===custSearch.trim().toLowerCase())&&(
                     <div className="px-3 py-2 text-xs bg-yellow-50 border-t border-yellow-100 text-yellow-700">
                       <span className="font-bold">"{custSearch}"</span> — new customer, will be created on save
                     </div>
                   )}
                   {!custSearch.trim()&&filteredCustomers.length===0&&(
                     <p className="px-3 py-2 text-xs text-gray-400">No customers yet</p>
                   )}
                 </div>
               )}
             </div>
          }
        </div>

        {/* Order Items */}
        <div>
          <div className="flex items-center justify-between mb-2">
            <label className="text-xs font-bold text-gray-500">Products</label>
            <Btn size="xs" variant="secondary" onClick={addItem}>+ Add Item</Btn>
          </div>
          <div className="space-y-2">
            {items.map((item,idx)=>{
              const prod=catalog.find(p=>p.id===item.productId);
              const unitPrice=+item.priceUZS||0;
              const disc=Math.min(100,Math.max(0,+item.discountPct||0));
              const effectivePrice=Math.round(unitPrice*(1-disc/100));
              const qty=+item.quantity||1;
              const lineTotal=effectivePrice*qty;
              const shipping=(prod?.weightGrams/1000)*(+settings?.shippingRateKRW||15000);
              const costPerUnit=prod?(+prod.estimatedCostKRW+shipping)*(+settings?.uzsPerKrw||8):0;
              const profit=lineTotal-costPerUnit*qty;
              return(
                <div key={idx} className="border border-gray-200 rounded-xl p-3 space-y-2 bg-gray-50">
                  <div className="flex items-start gap-2">
                    <div className="flex-1">
                      {prod
                        ?<div className="flex items-center gap-2 bg-pink-50 rounded-lg px-2 py-1.5">
                           <span className="text-xs font-bold text-pink-600 flex-1 truncate">{prod.brand} · {prod.name}</span>
                           <button onClick={()=>updateItem(idx,'productId','')} className="text-gray-400 hover:text-red-500 font-black text-sm">×</button>
                         </div>
                        :<div>
                           <input value={activeItemIdx===idx?prodSearch:''} onFocus={()=>{setActiveItemIdx(idx);setProdSearch('');}}
                             onChange={e=>setProdSearch(e.target.value)} placeholder="Search product…"
                             className="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-xs bg-white"/>
                           {activeItemIdx===idx&&(
                             <div className="border border-gray-200 rounded-xl bg-white shadow-lg max-h-36 overflow-y-auto mt-1 z-10 relative">
                               {filteredCatalog.length===0?<p className="px-3 py-2 text-xs text-gray-400">No results</p>
                                :filteredCatalog.map(p=>(
                                  <button key={p.id} onClick={()=>{updateItem(idx,'productId',p.id);setActiveItemIdx(null);setProdSearch('');}}
                                    className="w-full text-left px-3 py-1.5 hover:bg-pink-50 text-xs border-b border-gray-100 last:border-0">
                                    <span className="font-bold text-pink-500">{p.brand}</span> {p.name}
                                    <span className="text-gray-400 ml-1">{p.category}</span>
                                  </button>
                                ))
                               }
                             </div>
                           )}
                         </div>
                      }
                    </div>
                    {items.length>1&&<button onClick={()=>removeItem(idx)} className="text-red-400 hover:text-red-600 font-black mt-1">✕</button>}
                  </div>
                  <div className="grid grid-cols-3 gap-2">
                    <Inp label="Qty" type="number" min="1" value={item.quantity} onChange={e=>updateItem(idx,'quantity',e.target.value)}/>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 mb-1">Discount %</label>
                      <div className="flex items-center border border-gray-200 rounded-xl bg-white overflow-hidden">
                        <input type="number" min="0" max="100" value={item.discountPct||''} onChange={e=>updateItem(idx,'discountPct',e.target.value)}
                          placeholder="0" className="w-full px-3 py-2 text-sm outline-none bg-transparent"/>
                        <span className="text-gray-400 text-sm pr-3 font-bold">%</span>
                      </div>
                    </div>
                    <Sel label="Type" value={item.type} onChange={e=>updateItem(idx,'type',e.target.value)}>
                      <option>B2C</option><option>B2B</option>
                    </Sel>
                  </div>
                  {prod&&(
                    <div className="bg-white rounded-lg px-3 py-2 border border-gray-100 space-y-0.5">
                      <div className="flex items-center justify-between text-xs text-gray-500">
                        <span>Unit price</span>
                        <span className={disc>0?'line-through text-gray-400':'font-bold text-gray-700'}>{unitPrice>0?fmtUZS(unitPrice):<span className="italic text-orange-400">not set in catalog</span>}</span>
                      </div>
                      {disc>0&&<div className="flex items-center justify-between text-xs">
                        <span className="text-pink-500 font-bold">After {disc}% off</span>
                        <span className="font-bold text-pink-600">{fmtUZS(effectivePrice)}</span>
                      </div>}
                      <div className="flex items-center justify-between text-sm font-black border-t border-gray-100 pt-1 mt-1">
                        <span className="text-gray-600">× {qty} = Total</span>
                        <span className="text-gray-800">{fmtUZS(lineTotal)}</span>
                      </div>
                      {costPerUnit>0&&<div className={`flex items-center justify-between text-xs font-bold pt-0.5 ${profit>=0?'text-emerald-600':'text-red-500'}`}>
                        <span>Profit</span>
                        <span>{profit>=0?'+':''}{fmtUZS(profit)} {profit<0?'⚠️':'✓'}</span>
                      </div>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          {orderTotal>0&&<div className="text-right mt-2"><span className="text-sm font-black text-gray-800">Order Total: {fmtUZS(orderTotal)}</span></div>}
        </div>

        <div className="grid grid-cols-3 gap-3">
          <Sel label="Status" value={form.status} onChange={e=>f('status',e.target.value)}>
            {ORDER_STATUSES.map(s=><option key={s}>{s}</option>)}
          </Sel>
          <Sel label="Payment" value={form.paymentStatus} onChange={e=>f('paymentStatus',e.target.value)}>
            <option>Unpaid</option><option>Paid</option>
          </Sel>
          <Sel label="Salesperson" value={form.salesperson} onChange={e=>f('salesperson',e.target.value)}>
            {sp.map(s=><option key={s}>{s}</option>)}
          </Sel>
        </div>

        <div>
          <label className="block text-xs font-bold text-gray-500 mb-1">Notes</label>
          <textarea value={form.notes} onChange={e=>f('notes',e.target.value)} rows={2}
            className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 resize-none" placeholder="e.g. 10% discount, gift wrap…"/>
        </div>

        <Btn size="lg" onClick={submit} loading={saving}>✓ Save Order</Btn>
      </div>
    </Modal>
  );
}

// ── CUSTOMERS PAGE ────────────────────────────────────────────
function CustomersPage({customers,setCustomers,orders,orderItems,notify}) {
  const [showForm,setShowForm]=useState(false);
  const [editC,   setEditC]  =useState(null);
  const [saving,  setSaving] =useState(false);
  const [search,  setSearch] =useState('');

  const filtered=useMemo(()=>{
    if(!search.trim()) return customers;
    const q=search.toLowerCase();
    return customers.filter(c=>c.name.toLowerCase().includes(q)||c.phone?.includes(q)||c.telegram?.toLowerCase().includes(q)||c.address?.toLowerCase().includes(q));
  },[customers,search]);

  const save=async(data)=>{
    setSaving(true);
    try{
      if(editC){
        const{error}=await db.from('customers').update(toDB.customer(data)).eq('id',editC.id);
        if(error) throw error;
        setCustomers(prev=>prev.map(c=>c.id===editC.id?{...c,...data}:c));
        notify('Customer updated ✓');
      } else {
        const{data:nd,error}=await db.from('customers').insert(toDB.customer(data)).select().single();
        if(error) throw error;
        setCustomers(prev=>[...prev,fromDB.customer(nd)].sort((a,b)=>a.name.localeCompare(b.name)));
        notify('Customer added ✓');
      }
      setShowForm(false); setEditC(null);
    }catch(e){notify('Save failed: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const del=async(id)=>{
    if(!confirm('Delete this customer?')) return;
    const{error}=await db.from('customers').delete().eq('id',id);
    if(error) return notify('Delete failed','error');
    setCustomers(prev=>prev.filter(c=>c.id!==id));
    notify('Customer deleted');
  };

  return(
    <div className="space-y-4 slide-up">
      <div className="flex items-center gap-2">
        <h2 className="font-black text-gray-800 text-xl flex-1">Customers <span className="text-gray-400 font-semibold text-sm">({customers.length})</span></h2>
        <Btn size="sm" onClick={()=>{setEditC(null);setShowForm(true);}}>+ Add Customer</Btn>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, phone, address…"
        className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-white w-full max-w-sm"/>

      {filtered.length===0
        ?<Empty icon="👥" title="No customers yet" sub="Add your first customer" action={<Btn onClick={()=>setShowForm(true)}>+ Add Customer</Btn>}/>
        :<TblWrap>
          <thead><tr><th>Name</th><th>Telegram / Phone</th><th>Address</th><th>Orders</th><th>Total Spent</th><th></th></tr></thead>
          <tbody>
            {filtered.map(c=>{
              const custOrders=orders.filter(o=>o.customerId===c.id);
              const custItems=orderItems.filter(i=>custOrders.some(o=>o.id===i.orderId));
              const spent=custItems.reduce((s,i)=>s+(+i.priceUZS||0)*(+i.quantity||1),0);
              return(
                <tr key={c.id}>
                  <td className="font-bold text-gray-800">{c.name}</td>
                  <td className="text-gray-600 text-sm">
                    {c.telegram&&<p className="text-blue-500">@{c.telegram.replace('@','')}</p>}
                    {c.phone&&<p>{c.phone}</p>}
                  </td>

function CatalogPage({catalog,setCatalog,settings,notify}) {
  const [search,   setSearch]   =useState('');
  const [catFilter,setCatFilter]=useState('All');
  const [showForm, setShowForm] =useState(false);
  const [editProd, setEditProd] =useState(null);
  const [saving,   setSaving]   =useState(false);

  const filtered=useMemo(()=>{
    let list=catFilter==='All'?catalog:catalog.filter(p=>p.category===catFilter);
    if(search.trim()){const q=search.toLowerCase();list=list.filter(p=>(`${p.brand} ${p.name}`).toLowerCase().includes(q));}
    return list;
  },[catalog,search,catFilter]);

  const save=async(data)=>{
    setSaving(true);
    try{
      if(editProd){
        const{error}=await db.from('catalog').update(toDB.catalog(data)).eq('id',editProd.id);
        if(error) throw error;
        setCatalog(prev=>prev.map(p=>p.id===editProd.id?{...p,...data}:p));
        notify('Product updated ✓');
      } else {
        const{data:nd,error}=await db.from('catalog').insert(toDB.catalog(data)).select().single();
        if(error) throw error;
        setCatalog(prev=>[...prev,fromDB.catalog(nd)].sort((a,b)=>a.brand.localeCompare(b.brand)));
        notify('Product added ✓');
      }
      setShowForm(false); setEditProd(null);
    }catch(e){notify('Save failed: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const del=async(id)=>{
    if(!confirm('Remove from catalog?')) return;
    const{error}=await db.from('catalog').delete().eq('id',id);
    if(error) return notify('Delete failed','error');
    setCatalog(prev=>prev.filter(p=>p.id!==id));
    notify('Product removed');
  };

  const cats=['All',...new Set(catalog.map(p=>p.category).filter(Boolean))].sort();

  return(
    <div className="space-y-4 slide-up">
      <div className="flex flex-wrap items-center gap-2">
        <h2 className="font-black text-gray-800 text-xl flex-1">Product Catalog <span className="text-gray-400 font-semibold text-sm">({catalog.length})</span></h2>
        <Btn size="sm" onClick={()=>{setEditProd(null);setShowForm(true);}}>+ Add Product</Btn>
      </div>
      <div className="flex flex-wrap gap-2 items-center">
        <div className="flex gap-1 overflow-x-auto">
          {cats.map(c=>(
            <button key={c} onClick={()=>setCatFilter(c)}
              className={`flex-shrink-0 px-3 py-1 rounded-full text-xs font-bold transition-all ${catFilter===c?'bg-pink-500 text-white':'bg-white text-gray-500 border border-gray-200'}`}>
              {c}
            </button>
          ))}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search brand, name…"
          className="border border-gray-200 rounded-xl px-3 py-1.5 text-sm bg-white ml-auto w-48"/>
      </div>

      {filtered.length===0
        ?<Empty icon="🗂️" title="No products found" sub="Add products to your catalog" action={<Btn onClick={()=>setShowForm(true)}>+ Add Product</Btn>}/>
        :<TblWrap>
          <thead><tr>
            <th>Brand</th><th>Name</th><th>Category</th><th>Skin</th><th>Weight</th><th>Cost (KRW)</th><th>Ship (KRW)</th><th>B2C Price</th><th>B2C Profit</th><th>B2B Price</th><th>B2B Profit</th><th></th>
          </tr></thead>
          <tbody>
            {filtered.map(p=>{
              const ship=(p.weightGrams/1000)*(+settings.shippingRateKRW||15000);
              const rate=+settings.uzsPerKrw||8;
              const totalCost=(+p.estimatedCostKRW||0)+ship;
              const b2cP=(+p.suggestedB2CPrice||0)-totalCost*rate;
              const b2bP=(+p.suggestedB2BPrice||0)-totalCost*rate;
              return(
                <tr key={p.id}>
                  <td className="font-bold text-pink-600 whitespace-nowrap">{p.brand}</td>
                  <td className="font-semibold text-gray-800 max-w-[180px]"><span className="truncate block" title={p.name}>{p.name}</span></td>
                  <td><span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full font-semibold whitespace-nowrap">{p.category||'—'}</span></td>
                  <td className="text-xs text-gray-500 whitespace-nowrap">{p.skinType}</td>
                  <td className="text-xs text-gray-500 whitespace-nowrap">{p.weightGrams}g</td>
                  <td className="font-semibold text-gray-700 whitespace-nowrap">{fmtKRW(p.estimatedCostKRW)}</td>
                  <td className="text-blue-500 text-xs whitespace-nowrap">{fmtKRW(ship)}</td>
                  <td className="font-bold text-emerald-600 whitespace-nowrap">{p.suggestedB2CPrice?fmtUZS(p.suggestedB2CPrice):'—'}</td>
                  <td className={`font-bold text-xs whitespace-nowrap ${p.suggestedB2CPrice?(b2cP>=0?'text-emerald-700':'text-red-500'):'text-gray-300'}`}>{p.suggestedB2CPrice?fmtUZS(b2cP):'—'}</td>
                  <td className="font-bold text-indigo-600 whitespace-nowrap">{p.suggestedB2BPrice?fmtUZS(p.suggestedB2BPrice):'—'}</td>
                  <td className={`font-bold text-xs whitespace-nowrap ${p.suggestedB2BPrice?(b2bP>=0?'text-indigo-700':'text-red-500'):'text-gray-300'}`}>{p.suggestedB2BPrice?fmtUZS(b2bP):'—'}</td>
                  <td>
                    <div className="flex gap-1">
                      <Btn size="xs" variant="ghost" onClick={()=>{setEditProd(p);setShowForm(true);}}>✎</Btn>
                      <Btn size="xs" variant="danger" onClick={()=>del(p.id)}>✕</Btn>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </TblWrap>
      }
      {showForm&&<ProductForm product={editProd} settings={settings} onSave={save} saving={saving} onClose={()=>{setShowForm(false);setEditProd(null);}}/>}

  );

function ProcurementPage({orders,orderItems,catalog,settings}) {
  const rate=+settings.shippingRateKRW||15000;

  const list=useMemo(()=>{
    const pendingOrderIds=new Set(orders.filter(o=>o.status==='Pending').map(o=>o.id));
    const pendingItems=orderItems.filter(i=>pendingOrderIds.has(i.orderId));
    const groups={};
    pendingItems.forEach(i=>{
      const key=i.productId||'unknown';
      if(!groups[key]){const p=catalog.find(c=>c.id===i.productId);groups[key]={product:p,totalQty:0,orderCount:0};}
      groups[key].totalQty+=+i.quantity||1;
      groups[key].orderCount+=1;
    });
    return Object.values(groups).sort((a,b)=>(a.product?.brand||'').localeCompare(b.product?.brand||''));
  },[orders,orderItems,catalog]);

  const grandTotalKRW=list.reduce((s,g)=>{
    if(!g.product) return s;
    const ship=(g.product.weightGrams/1000)*rate;
    return s+((+g.product.estimatedCostKRW||0)+ship)*g.totalQty;
  },0);

  const pendingCount=orders.filter(o=>o.status==='Pending').length;

  return(
    <div className="space-y-4 slide-up">
      <div className="flex items-center justify-between">
        <div>
          <h2 className="font-black text-gray-800 text-xl">Buy List</h2>
          <p className="text-sm text-gray-400">{pendingCount} pending order{pendingCount!==1?'s':''} · what to buy in Korea</p>
        </div>
        {grandTotalKRW>0&&(
          <div className="bg-gradient-to-br from-pink-500 to-rose-600 text-white rounded-2xl px-5 py-3 text-right shadow-sm">
            <p className="text-xs font-semibold opacity-70">Total to Send Korea</p>
            <p className="text-xl font-black">{fmtKRW(grandTotalKRW)}</p>
          </div>
        )}
      </div>

      {list.length===0
        ?<Empty icon="🛒" title="Buy list is empty" sub="Add orders with Pending status to see what needs to be bought"/>
        :<TblWrap>
          <thead><tr>
            <th>Brand</th><th>Product</th><th>Category</th><th>Total Qty</th><th>Unit Cost (KRW)</th><th>Shipping (KRW)</th><th>Total Cost (KRW)</th><th>Orders</th>
          </tr></thead>
          <tbody>
            {list.map((g,i)=>{
              const ship=g.product?(g.product.weightGrams/1000)*rate:0;
              const unitCost=(+g.product?.estimatedCostKRW||0)+ship;
              const totalCost=unitCost*g.totalQty;
              return(
                <tr key={i}>
                  <td className="font-bold text-pink-600">{g.product?.brand||'—'}</td>
                  <td className="font-semibold text-gray-800 max-w-[200px]"><span className="truncate block">{g.product?.name||'Unknown product'}</span></td>
                  <td><span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">{g.product?.category||'—'}</span></td>
                  <td className="font-black text-pink-600 text-lg">{g.totalQty}</td>
                  <td className="text-gray-600">{g.product?fmtKRW(unitCost):'—'}</td>
                  <td className="text-blue-500 text-xs">{g.product?fmtKRW(ship):'—'}</td>
                  <td className="font-bold text-gray-800">{g.product?fmtKRW(totalCost):'—'}</td>
                  <td className="text-gray-400 text-sm">{g.orderCount}</td>
                </tr>
              );
            })}
          </tbody>
          {grandTotalKRW>0&&(
            <tfoot>
              <tr>
                <td colSpan={6} className="px-3 py-3 text-right font-black text-gray-700 text-sm">Grand Total</td>
                <td className="px-3 py-3 font-black text-pink-600 text-base">{fmtKRW(grandTotalKRW)}</td>
                <td/>
              </tr>
            </tfoot>
          )}
        </TblWrap>
      }
    </div>
  );
}

function FinancePage({expenses,setExpenses,transfers,setTransfers,capital,setCapital,settings,notify}) {

  const totalRevUZS=0; // pulled from orders in real usage

  const totalTransUZS=transfers.reduce((s,t)=>s+(+t.amountUZS||0),0);
  const totalCapUZS=capital.reduce((s,c)=>s+(+c.amountUZS||0),0);
  const totalCostUZS=(totalExpKRW+totalTransKRW)*rate;

  return(

        <StatBox label="Local Expenses"   value={fmtKRW(totalExpKRW)}    sub="Salary, cargo etc"               color="amber"/>

      {/* Tabs */}
      <div className="flex gap-2">
        {[['overview','Overview'],['transfers','Korea Transfers'],['expenses','Local Expenses'],['capital','Capital']].map(([k,l])=>(

function FinanceOverview({expenses,transfers,capital,settings}) {
  const rate=+settings.uzsPerKrw||8;
  // Group by month
  const months={};
  const addMonth=(date,krw,uzs)=>{
    const m=date?.slice(0,7)||'Unknown';
    if(!months[m]) months[m]={krw:0,uzs:0};
    months[m].krw+=krw||0;
    months[m].uzs+=uzs||0;
  };
  expenses.forEach(e=>addMonth(e.date,+e.amountKRW,+e.amountKRW*rate));
  transfers.forEach(t=>addMonth(t.date,+t.amountKRW,+t.amountUZS));

  const sortedMonths=Object.entries(months).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);

  return(
    <div className="space-y-3">
      {sortedMonths.length===0
        ?<Card className="p-6 text-center text-gray-400">No financial data yet. Add transfers and expenses.</Card>
        :<TblWrap>
          <thead><tr><th>Month</th><th>Total Spent (KRW)</th><th>≈ UZS</th></tr></thead>
          <tbody>
            {sortedMonths.map(([m,v])=>(
              <tr key={m}>
                <td className="font-bold text-gray-700">{m}</td>
                <td className="font-black text-gray-800">{fmtKRW(v.krw)}</td>
                <td className="text-gray-500">{fmtUZS(v.uzs)}</td>
              </tr>
            ))}
          </tbody>
        </TblWrap>
      }
    </div>
  );
}

  const sp=settings.salespersons||[];

  const save=async(data)=>{
    setSaving(true);
    try{
      const{data:nd,error}=await db.from('expenses').insert(toDB.expense(data)).select().single();
      if(error) throw error;
      setExpenses(prev=>[fromDB.expense(nd),...prev]);
      notify('Expense added ✓');
      setShowForm(false);
    }catch(e){notify('Save failed: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const del=async(id)=>{
    if(!confirm('Delete this expense?')) return;
    await db.from('expenses').delete().eq('id',id);
    setExpenses(prev=>prev.filter(e=>e.id!==id));
    notify('Deleted');
  };

  const total=expenses.reduce((s,e)=>s+(+e.amountKRW||0),0);

  return(
    <div className="space-y-3">
      <div className="flex items-center justify-between">
        <p className="text-sm text-gray-500">Total: <span className="font-black text-red-500">{fmtKRW(total)}</span></p>
        <Btn size="sm" onClick={()=>setShowForm(true)}>+ Add Expense</Btn>
      </div>
      {expenses.length===0
        ?<Empty icon="💰" title="No expenses" sub="Record salary, cargo, packaging costs"/>
        :<TblWrap>
          <thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Amount (KRW)</th><th>Paid By</th><th></th></tr></thead>
          <tbody>
            {expenses.map(e=>(
              <tr key={e.id}>
                <td className="text-gray-400 text-xs">{fmtDate(e.date)}</td>
                <td><span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full font-bold">{e.type}</span></td>
                <td className="font-semibold text-gray-800">{e.description}</td>
                <td className="font-black text-red-500">{fmtKRW(e.amountKRW)}</td>
                <td className="text-gray-500 text-xs">{e.paidBy||'—'}</td>
                <td><Btn size="xs" variant="danger" onClick={()=>del(e.id)}>✕</Btn></td>
              </tr>
            ))}
          </tbody>
        </TblWrap>
      }
      {showForm&&(
        <Modal title="New Expense" onClose={()=>setShowForm(false)}>
          <div className="space-y-3">
            <ExpenseFormInner onSave={save} saving={saving} salespersons={sp}/>
          </div>
        </Modal>
      )}
    </div>
  );
}

function ExpenseFormInner({onSave,saving,salespersons}) {
  const sp=salespersons||[];
  const [form,setForm]=useState({date:today(),type:'Salary',description:'',amountKRW:'',paidBy:sp[0]||''});
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  return(
    <div className="space-y-3">
      <div className="grid grid-cols-2 gap-3">
        <Inp label="Date" required type="date" value={form.date} onChange={e=>f('date',e.target.value)}/>
        <Sel label="Type" required value={form.type} onChange={e=>f('type',e.target.value)}>{EXP_TYPES.map(t=><option key={t}>{t}</option>)}</Sel>
      </div>
      <Inp label="Description" required value={form.description} onChange={e=>f('description',e.target.value)} placeholder="e.g. Monthly salary Nazokat"/>
      <Inp label="Amount (KRW)" required type="number" min="0" value={form.amountKRW} onChange={e=>f('amountKRW',e.target.value)} placeholder="50000"/>
      <div>
        <label className="block text-xs font-bold text-gray-500 mb-1">Paid By</label>
        <input list="sp-list" value={form.paidBy} onChange={e=>f('paidBy',e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50"/>
        <datalist id="sp-list">{sp.map(s=><option key={s} value={s}/>)}</datalist>
      </div>
      <Btn size="lg" onClick={()=>{if(!form.description.trim()||!form.amountKRW)return alert('Fill required fields.');onSave(form);}} loading={saving}>✓ Save Expense</Btn>
    </div>
  );
}

function CapitalTab({capital,setCapital,notify}) {
  const [showForm,setShowForm]=useState(false);
  const [saving,  setSaving]  =useState(false);

  const save=async(data)=>{
    setSaving(true);
    try{
      const{data:nd,error}=await db.from('capital').insert(toDB.capital(data)).select().single();
      if(error) throw error;
      setCapital(prev=>[fromDB.capital(nd),...prev]);
      notify('Capital recorded ✓');
      setShowForm(false);
    }catch(e){notify('Save failed: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const del=async(id)=>{
    if(!confirm('Delete?')) return;
    await db.from('capital').delete().eq('id',id);
    setCapital(prev=>prev.filter(c=>c.id!==id));
  };

  const total=capital.reduce((s,c)=>s+(+c.amountUZS||0),0);

  return(
    <div className="space-y-3">
      <div className="flex items-center justify-between">
        <p className="text-sm text-gray-500">Total invested: <span className="font-black text-violet-600">{fmtUZS(total)}</span></p>
        <Btn size="sm" onClick={()=>setShowForm(true)}>+ Add Capital</Btn>
      </div>
      {capital.length===0
        ?<Empty icon="💼" title="No capital entries" sub="Record money added to the business"/>
        :<TblWrap>
          <thead><tr><th>Date</th><th>Amount (UZS)</th><th>Person</th><th>Notes</th><th></th></tr></thead>
          <tbody>
            {capital.map(c=>(
              <tr key={c.id}>
                <td className="text-gray-400 text-xs">{fmtDate(c.date)}</td>
                <td className="font-black text-violet-600">{fmtUZS(c.amountUZS)}</td>
                <td className="font-semibold text-gray-700">{c.person||'—'}</td>
                <td className="text-gray-500 text-sm">{c.notes||'—'}</td>
                <td><Btn size="xs" variant="danger" onClick={()=>del(c.id)}>✕</Btn></td>
              </tr>
            ))}
          </tbody>
        </TblWrap>
      }
      {showForm&&(
        <Modal title="Add Capital" onClose={()=>setShowForm(false)}>
          <div className="space-y-3">
            <CapitalForm onSave={save} saving={saving}/>
          </div>
        </Modal>
      )}
    </div>
  );
}

function CapitalForm({onSave,saving}) {
  const [form,setForm]=useState({date:today(),amountUZS:'',person:'',notes:''});
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  return(
    <div className="space-y-3">
      <Inp label="Date" required type="date" value={form.date} onChange={e=>f('date',e.target.value)}/>
      <Inp label="Amount (UZS)" required type="number" min="0" value={form.amountUZS} onChange={e=>f('amountUZS',e.target.value)} placeholder="5000000"/>
      <Inp label="Person" value={form.person} onChange={e=>f('person',e.target.value)} placeholder="Who added the money"/>
      <Inp label="Notes" value={form.notes} onChange={e=>f('notes',e.target.value)} placeholder="e.g. Initial investment"/>
      <Btn size="lg" onClick={()=>{if(!form.amountUZS)return alert('Enter amount.');onSave(form);}} loading={saving}>✓ Save</Btn>
    </div>
  );
}

// ── SETTINGS PAGE ─────────────────────────────────────────────
function SettingsPage({settings,setSettings,notify}) {
  const [shipRate, setShipRate]  =useState(settings.shippingRateKRW||15000);
  const [uzsPerKrw,setUzsPerKrw]=useState(settings.uzsPerKrw||8);
  const [spTxt,    setSpTxt]     =useState((settings.salespersons||[]).join(', '));

  const save=()=>{
    setSettings({...settings,shippingRateKRW:+shipRate,uzsPerKrw:+uzsPerKrw,salespersons:spTxt.split(',').map(s=>s.trim()).filter(Boolean)});
    notify('Settings saved ✓');
  };

  return(
    <div className="max-w-lg space-y-4 slide-up">
      <h2 className="font-black text-gray-800 text-xl">Settings</h2>
      <Card className="p-4 space-y-4">
        <p className="font-extrabold text-gray-700">Rates</p>
        <div>
          <Inp label="Shipping Rate (KRW per kg)" type="number" min="0" value={shipRate} onChange={e=>setShipRate(e.target.value)}/>
          <p className="text-xs text-gray-400 mt-1">100g → {fmtKRW((100/1000)*(+shipRate||15000))} · 500g → {fmtKRW((500/1000)*(+shipRate||15000))}</p>
        </div>
        <div>
          <Inp label="Exchange Rate (UZS per 1 KRW)" type="number" min="0" step="0.1" value={uzsPerKrw} onChange={e=>setUzsPerKrw(e.target.value)}/>
          <p className="text-xs text-gray-400 mt-1">₩1,000 = {(1000*(+uzsPerKrw||8)).toLocaleString()} UZS · ₩10,000 = {(10000*(+uzsPerKrw||8)).toLocaleString()} UZS</p>
        </div>
      </Card>
      <Card className="p-4 space-y-3">
        <p className="font-extrabold text-gray-700">Team</p>
        <div>
          <label className="block text-xs font-bold text-gray-500 mb-1">Salespersons (comma-separated)</label>
          <textarea value={spTxt} onChange={e=>setSpTxt(e.target.value)} rows={2}
            className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 resize-none" placeholder="Nazokat, Namuna, OJ…"/>
        </div>
      </Card>
      <Btn size="lg" onClick={save}>✓ Save Settings</Btn>
      <Card className="p-4">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center text-white font-black">M</div>
          <div>
            <p className="font-black text-gray-800">Muna Manager</p>
            <p className="text-xs text-gray-400">v4.0 · K-Beauty Business System · Supabase</p>
          </div>
        </div>
      </Card>
    </div>
  );
}

// ── MOUNT ─────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
